name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - run: python -m pytest tests/ -v --ignore=tests/e2e

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]" pytest-playwright playwright pytest-timeout
      - run: python -m playwright install chromium --with-deps
      - name: Pre-pull utility container image
        run: |
          docker pull ghcr.io/hyang0129/supreme-claudemander-util:latest \
            && docker tag ghcr.io/hyang0129/supreme-claudemander-util:latest supreme-claudemander-util:latest \
            || echo "GHCR pull failed — server will fall back to local build"
      - name: Run Playwright smoke tests (headless)
        run: python -m pytest tests/e2e/ -v --timeout=120 --ignore=tests/e2e/real
        env:
          CLAUDE_RTS_TEST_MODE: "1"
          CLAUDE_RTS_PORT: "3099"
      - name: Upload screenshots and traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            tests/e2e/traces/
            tests/e2e/screenshots/
          retention-days: 7

  tailscale:
    # Skip on fork PRs — secrets are not available to forks, and we must
    # not attempt Tailscale enrollment without credentials. Direct pushes
    # (no pull_request payload) and same-repo PRs run the job.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - name: Enroll ephemeral Tailscale node
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Start server bound to 0.0.0.0
        run: |
          python -m claude_rts --host 0.0.0.0 --no-browser >/tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for the server to start listening on port 3000.
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ >/dev/null; then
              echo "Server is up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3000/ >/dev/null \
            || { echo "Server failed to start within 30s"; cat /tmp/server.log; exit 1; }
      - name: Verify reachability at Tailscale IP
        run: |
          TS_IP="$(tailscale ip -4 | head -n1)"
          if [ -z "$TS_IP" ]; then
            echo "Failed to resolve Tailscale IPv4 address" >&2
            exit 1
          fi
          echo "Tailscale IP: $TS_IP"
          # Fail loudly on non-2xx, and echo the headers for the CI log.
          curl -fsS -D - "http://${TS_IP}:3000/" -o /dev/null
      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi
      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-server-log
          path: /tmp/server.log
          retention-days: 7
