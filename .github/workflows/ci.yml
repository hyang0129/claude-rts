name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - run: python -m pytest tests/ -v --ignore=tests/e2e

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]" pytest-playwright playwright pytest-timeout
      - run: python -m playwright install chromium --with-deps
      - name: Pre-pull utility container image
        run: |
          docker pull ghcr.io/hyang0129/supreme-claudemander-util:latest \
            && docker tag ghcr.io/hyang0129/supreme-claudemander-util:latest supreme-claudemander-util:latest \
            || echo "GHCR pull failed — server will fall back to local build"
      - name: Run Playwright smoke tests (headless)
        run: python -m pytest tests/e2e/ -v --timeout=120 --ignore=tests/e2e/real
        env:
          CLAUDE_RTS_TEST_MODE: "1"
          CLAUDE_RTS_PORT: "3099"
      - name: Upload screenshots and traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            tests/e2e/traces/
            tests/e2e/screenshots/
          retention-days: 7
