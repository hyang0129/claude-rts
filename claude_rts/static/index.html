<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>supreme-claudemander</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #11111b;
    color: #cdd6f4;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ── Status bar ── */
  #status-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 32px;
    background: #181825;
    border-bottom: 1px solid #313244;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 13px;
    z-index: 1000;
    gap: 16px;
  }
  #status-bar .title { font-weight: 600; color: #cba6f7; }
  #status-bar .info { color: #a6adc8; }
  #status-bar .btn {
    background: #313244; border: 1px solid #45475a; color: #cdd6f4;
    padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  #status-bar .btn:hover { background: #45475a; }

  /* ── Viewport (clips the canvas) ── */
  #viewport {
    position: fixed;
    top: 32px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }
  #viewport.panning { cursor: grabbing; }

  /* ── Canvas (4K, pannable/zoomable) ── */
  #canvas {
    position: absolute;
    width: 3840px;
    height: 2160px;
    transform-origin: 0 0;
    background-color: #141422;
    background-image:
      linear-gradient(rgba(69, 71, 90, 0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(69, 71, 90, 0.3) 1px, transparent 1px),
      linear-gradient(rgba(69, 71, 90, 0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(69, 71, 90, 0.12) 1px, transparent 1px);
    background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
  }

  /* ── Terminal card ── */
  .terminal-card {
    position: absolute;
    display: flex;
    flex-direction: column;
    border: 1px solid #45475a;
    border-radius: 8px;
    overflow: hidden;
    background: #1e1e2e;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    min-width: 300px;
    min-height: 200px;
  }
  .terminal-card.focused { border-color: #cba6f7; box-shadow: 0 4px 24px rgba(203,166,247,0.15); }

  .terminal-titlebar {
    height: 32px;
    background: #313244;
    display: flex;
    align-items: center;
    padding: 0 8px 0 12px;
    font-size: 13px;
    font-weight: 500;
    gap: 8px;
    flex-shrink: 0;
    cursor: move;
    user-select: none;
  }
  .terminal-titlebar .hub-symbol {
    font-size: 13px; font-weight: 700; flex-shrink: 0;
    width: 20px; text-align: center; font-family: monospace;
  }
  .terminal-titlebar .hub-name { color: #cdd6f4; }
  .terminal-titlebar .container-name { color: #585b70; font-size: 11px; }
  .terminal-titlebar .spacer { flex: 1; }
  .terminal-titlebar .close-btn {
    width: 20px; height: 20px; border: none; background: transparent;
    color: #585b70; font-size: 16px; cursor: pointer; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .terminal-titlebar .close-btn:hover { background: #f38ba8; color: #1e1e2e; }

  .terminal-body {
    flex: 1;
    padding: 4px;
    min-height: 0;
  }
  .terminal-body .xterm { height: 100%; }

  /* Resize handle */
  .resize-handle {
    position: absolute;
    bottom: 0; right: 0;
    width: 16px; height: 16px;
    cursor: nwse-resize;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    bottom: 3px; right: 3px;
    width: 8px; height: 8px;
    border-right: 2px solid #585b70;
    border-bottom: 2px solid #585b70;
  }

  /* ── Minimap ── */
  #minimap {
    position: fixed;
    top: 44px; left: 12px;
    width: 200px; height: 112px;
    background: #181825;
    border: 1px solid #313244;
    border-radius: 6px;
    z-index: 999;
    overflow: hidden;
    cursor: pointer;
  }
  #minimap-canvas {
    width: 100%; height: 100%;
  }

  /* ── Mode indicator ── */
  #mode-indicator {
    position: fixed;
    bottom: 12px;
    right: 12px;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    font-family: monospace;
    z-index: 1000;
    pointer-events: none;
    letter-spacing: 1px;
  }
  #mode-indicator.rts { background: rgba(203,166,247,0.15); color: #cba6f7; }
  #mode-indicator.terminal { background: rgba(166,227,161,0.15); color: #a6e3a1; }

  /* ── Context menu ── */
  #context-menu {
    display: none;
    position: fixed;
    background: #1e1e2e;
    border: 1px solid #45475a;
    border-radius: 6px;
    padding: 4px 0;
    z-index: 2000;
    min-width: 200px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #context-menu.visible { display: block; }
  .ctx-header {
    padding: 6px 12px;
    font-size: 11px;
    color: #585b70;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ctx-item {
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctx-item:hover { background: #313244; }
  .ctx-item .symbol-preview {
    font-weight: 700; font-family: monospace; font-size: 13px;
    width: 16px; text-align: center; color: #cdd6f4;
  }

  /* ── Settings panel ── */
  #settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 3000;
  }
  #settings-overlay.visible { display: flex; align-items: center; justify-content: center; }

  #settings-panel {
    background: #1e1e2e;
    border: 1px solid #45475a;
    border-radius: 10px;
    width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }
  #settings-panel h2 {
    font-size: 16px; font-weight: 600; color: #cba6f7;
    padding: 16px 20px 12px; margin: 0;
    border-bottom: 1px solid #313244;
  }
  .settings-section {
    padding: 16px 20px;
    border-bottom: 1px solid #313244;
  }
  .settings-section:last-child { border-bottom: none; }
  .settings-section h3 {
    font-size: 13px; font-weight: 600; color: #a6adc8;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; font-size: 13px;
  }
  .setting-row label { color: #cdd6f4; }
  .setting-row select {
    background: #313244; color: #cdd6f4; border: 1px solid #45475a;
    border-radius: 4px; padding: 4px 8px; font-size: 12px;
  }
  .setting-row select:focus { outline: 1px solid #cba6f7; }
  .settings-footer {
    padding: 12px 20px;
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .settings-footer button {
    padding: 6px 16px; border-radius: 4px; font-size: 12px; cursor: pointer;
    border: 1px solid #45475a;
  }
  .settings-footer .btn-close { background: #313244; color: #cdd6f4; }
  .settings-footer .btn-close:hover { background: #45475a; }
  .settings-footer .btn-reset { background: transparent; color: #f38ba8; border-color: #f38ba8; }
  .settings-footer .btn-reset:hover { background: #f38ba822; }

  /* ── Canvas switcher ── */
  #canvas-switcher {
    position: relative;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #canvas-switcher-btn {
    background: #313244; border: 1px solid #45475a; color: #cdd6f4;
    padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  #canvas-switcher-btn:hover { background: #45475a; }
  #canvas-switcher-btn .canvas-icon { color: #cba6f7; }
  #canvas-switcher-btn .arrow { font-size: 10px; color: #a6adc8; }

  #canvas-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 4px;
    background: #1e1e2e;
    border: 1px solid #45475a;
    border-radius: 6px;
    padding: 4px 0;
    z-index: 2000;
    min-width: 200px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #canvas-dropdown.visible { display: block; }
  .canvas-dropdown-item {
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .canvas-dropdown-item:hover { background: #313244; }
  .canvas-dropdown-item.active { color: #cba6f7; }
  .canvas-dropdown-item .canvas-label { flex: 1; }
  .canvas-dropdown-item .delete-canvas-btn {
    background: none; border: none; color: #585b70; cursor: pointer;
    font-size: 14px; padding: 0 2px; border-radius: 3px;
    visibility: hidden;
  }
  .canvas-dropdown-item:hover .delete-canvas-btn { visibility: visible; }
  .canvas-dropdown-item .delete-canvas-btn:hover { color: #f38ba8; }
  .canvas-dropdown-sep {
    height: 1px;
    background: #313244;
    margin: 4px 0;
  }
  .canvas-dropdown-action {
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    color: #a6adc8;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .canvas-dropdown-action:hover { background: #313244; color: #cdd6f4; }

  /* ── Loader card ── */
  .loader-card {
    position: absolute;
    display: flex;
    flex-direction: column;
    border: 1px solid #45475a;
    border-radius: 8px;
    overflow: hidden;
    background: #1e1e2e;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    min-width: 300px;
    min-height: 120px;
  }
  .loader-card .loader-titlebar {
    height: 32px;
    background: #313244;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 13px;
    font-weight: 500;
    color: #cba6f7;
    user-select: none;
  }
  .loader-card .loader-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 12px;
  }
  .loader-card .loader-spinner {
    width: 24px; height: 24px;
    border: 3px solid #313244;
    border-top-color: #cba6f7;
    border-radius: 50%;
    animation: loaderSpin 0.8s linear infinite;
  }
  @keyframes loaderSpin {
    to { transform: rotate(360deg); }
  }
  .loader-card .loader-status {
    font-size: 12px;
    color: #a6adc8;
  }
  .loader-card.error { border-color: #f38ba8; }
  .loader-card.error .loader-titlebar { color: #f38ba8; }
  .loader-card.error .loader-spinner {
    border-top-color: #f38ba8;
    animation: none;
  }

  /* ── Widget body ── */
  .widget-body {
    padding: 12px;
    font-size: 13px;
    color: #cdd6f4;
    overflow-y: auto;
  }
  .widget-body .widget-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid #313244;
  }
  .widget-body .widget-row:last-child { border-bottom: none; }
  .widget-body .widget-label { color: #a6adc8; }
  .widget-body .widget-value { color: #cdd6f4; font-family: monospace; }

  /* ── Usage bar ── */
  .usage-bar-container {
    width: 100%; height: 8px; background: #313244; border-radius: 4px; overflow: hidden;
    margin-top: 4px;
  }
  .usage-bar {
    height: 100%; border-radius: 4px; transition: width 0.3s ease;
  }
  .usage-profile {
    padding: 8px 0;
    border-bottom: 1px solid #313244;
  }
  .usage-profile:last-child { border-bottom: none; }
  .usage-profile-name {
    font-weight: 600; color: #cdd6f4; font-size: 13px; margin-bottom: 6px;
  }
  .usage-metric {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; margin-bottom: 2px;
  }
  .usage-metric-label { color: #a6adc8; }
  .usage-metric-value { color: #cdd6f4; font-family: monospace; }
  .usage-reset { color: #585b70; font-size: 11px; }
  .usage-refresh-btn {
    background: #313244; border: 1px solid #45475a; color: #a6adc8;
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
    margin-top: 8px;
  }
  .usage-refresh-btn:hover { background: #45475a; color: #cdd6f4; }
  .usage-status { color: #585b70; font-size: 11px; text-align: center; padding: 8px 0; }

  /* ── Credential manager widget ── */
  .cred-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid #313244;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    border-radius: 4px;
  }
  .cred-row:last-of-type { border-bottom: none; }
  .cred-row:hover { background: rgba(69,71,90,0.4); }
  .cred-row.overburning .cred-name { color: #f38ba8; }
  .cred-row.stale { opacity: 0.6; }
  .cred-row.stale .cred-name { color: #585b70; }
  .cred-icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
  .cred-name { font-weight: 600; font-size: 12px; color: #cdd6f4; flex-shrink: 0; min-width: 80px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cred-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .cred-burn-bar { width: 100%; height: 6px; background: #313244; border-radius: 3px; overflow: hidden; }
  .cred-burn-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
  .cred-stats { display: flex; justify-content: space-between; font-size: 10px; color: #a6adc8; font-family: monospace; }
  .cred-detail {
    background: #181825;
    border: 1px solid #313244;
    border-radius: 6px;
    padding: 10px;
    margin: 2px 0 6px 26px;
    font-size: 11px;
  }
  .cred-detail-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    border-bottom: 1px solid #1e1e2e;
  }
  .cred-detail-row:last-child { border-bottom: none; }
  .cred-detail-label { color: #a6adc8; }
  .cred-detail-value { color: #cdd6f4; font-family: monospace; }
  .cred-detail-actions {
    display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px;
  }
  .cred-probe-btn, .cred-check-btn, .cred-reauth-btn {
    background: #313244; border: 1px solid #45475a;
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .cred-probe-btn { color: #89b4fa; }
  .cred-check-btn { color: #a6e3a1; }
  .cred-reauth-btn { color: #f9e2af; }
  .cred-probe-btn:hover, .cred-check-btn:hover, .cred-reauth-btn:hover { background: #45475a; }
  .cred-probe-btn:disabled, .cred-check-btn:disabled, .cred-reauth-btn:disabled { opacity: 0.5; cursor: default; }
  .cred-toolbar {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px; padding-top: 8px; border-top: 1px solid #313244;
    flex-wrap: wrap;
  }
  .cred-probe-all-btn {
    background: #313244; border: 1px solid #45475a; color: #89b4fa;
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
    flex-shrink: 0;
  }
  .cred-probe-all-btn:hover { background: #45475a; }
  .cred-probe-all-btn:disabled { opacity: 0.5; cursor: default; }
  .cred-add-form {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .cred-add-form input {
    flex: 1;
    background: #181825;
    border: 1px solid #45475a;
    color: #cdd6f4;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-family: monospace;
    outline: none;
  }
  .cred-add-form input:focus { border-color: #cba6f7; }
  .cred-add-form input::placeholder { color: #585b70; }
  .cred-add-btn {
    background: #313244; border: 1px solid #45475a; color: #a6e3a1;
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
    flex-shrink: 0;
  }
  .cred-add-btn:hover { background: #45475a; }
  .cred-footer-msg { color: #a6adc8; font-size: 11px; margin-top: 6px; text-align: center; }
  .cred-stale-age { font-size: 10px; color: #a6adc8; flex-shrink: 0; }
  .cred-stale-age.warn { color: #f9e2af; }
  .cred-stale-banner {
    background: rgba(243,139,168,0.15); border: 1px solid #f38ba8;
    border-radius: 6px; padding: 8px 10px; margin: 4px 0;
    font-size: 11px; color: #f38ba8; display: flex; align-items: center; gap: 6px;
  }

  /* ── Control group badge ── */
  .control-group-badge {
    font-size: 10px;
    font-family: monospace;
    background: rgba(203, 166, 247, 0.3);
    color: #cba6f7;
    padding: 0 4px;
    border-radius: 3px;
    margin-left: 2px;
  }
  .control-group-badge.flash {
    animation: cgFlash 0.4s ease-out;
  }
  @keyframes cgFlash {
    0% { background: rgba(203, 166, 247, 0.8); color: #1e1e2e; }
    100% { background: rgba(203, 166, 247, 0.3); color: #cba6f7; }
  }
</style>
</head>
<body>

<div id="status-bar">
  <span class="title">supreme-claudemander</span>
  <span class="info" id="hub-count">connecting...</span>
  <div id="canvas-switcher">
    <button id="canvas-switcher-btn">
      <span class="canvas-icon">&#9638;</span>
      <span id="canvas-switcher-label">main</span>
      <span class="arrow">&#9660;</span>
    </button>
    <div id="canvas-dropdown"></div>
  </div>
  <span class="info" id="zoom-level"></span>
  <div style="flex:1"></div>
  <button class="btn" id="btn-fit">Fit all</button>
  <button class="btn" id="btn-settings" title="Settings">&#9881;</button>
</div>

<div id="settings-overlay">
  <div id="settings-panel">
    <h2>Settings</h2>
    <div class="settings-section">
      <h3>Copy</h3>
      <div class="setting-row">
        <label>Copy shortcut</label>
        <select id="setting-copy">
          <option value="ctrl-shift-c">Ctrl+Shift+C</option>
          <option value="ctrl-c-sel">Ctrl+C (when text selected)</option>
          <option value="auto-select">Auto-copy on select</option>
        </select>
      </div>
    </div>
    <div class="settings-section">
      <h3>Paste</h3>
      <div class="setting-row">
        <label>Paste shortcut</label>
        <select id="setting-paste">
          <option value="ctrl-shift-v">Ctrl+Shift+V</option>
          <option value="ctrl-v">Ctrl+V</option>
          <option value="both">Both Ctrl+V and Ctrl+Shift+V</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Right-click on terminal</label>
        <select id="setting-rightclick">
          <option value="paste">Paste from clipboard</option>
          <option value="none">Do nothing</option>
        </select>
      </div>
    </div>
    <div class="settings-section">
      <h3>Terminal</h3>
      <div class="setting-row">
        <label>Scroll wheel behavior</label>
        <select id="setting-scrollMode" disabled>
          <option value="auto">Scroll terminal, Ctrl to zoom</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Idle threshold (seconds)</label>
        <select id="setting-idle">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="10">10</option>
          <option value="30">30</option>
        </select>
      </div>
    </div>
    <div class="settings-footer">
      <button class="btn-reset" id="btn-reset-settings">Reset defaults</button>
      <button class="btn-close" id="btn-close-settings">Close</button>
    </div>
  </div>
</div>

<div id="viewport">
  <div id="canvas"></div>
</div>

<div id="minimap">
  <canvas id="minimap-canvas" width="200" height="112"></canvas>
</div>

<div id="context-menu"></div>

<div id="mode-indicator" class="rts">RTS</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
// ════════════════════════════════════════════
// Global: suppress browser default context menu everywhere
// ════════════════════════════════════════════
document.addEventListener('contextmenu', e => e.preventDefault());

// ════════════════════════════════════════════
// Constants
// ════════════════════════════════════════════
const CANVAS_W = 3840;
const CANVAS_H = 2160;
const CARD_W = 720;
const CARD_H = 480;
const CARD_GAP = 40;

// Hub symbols: each hub gets a unique letter
const HUB_SYMBOLS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

// State colors
const STATE_COLORS = {
  working: '#a6e3a1',      // green — stdout activity in last N seconds
  idle: '#f9e2af',         // yellow — no recent output, process alive
  dead: '#f38ba8',         // red — disconnected or process exited
  connecting: '#585b70',   // gray — initial connection
};
let IDLE_THRESHOLD_MS = 5000; // updated by settings

// ════════════════════════════════════════════
// State
// ════════════════════════════════════════════
let cards = [];         // Card instances
let hubs = [];          // from /api/hubs
let hubSymbolMap = {};  // hub name -> symbol
let pan = { x: 0, y: 0 };
let zoom = 1;
let isPanning = false;
let panStart = { x: 0, y: 0, panX: 0, panY: 0 };
let rightClickStart = null; // {x, y} — tracks right-click origin for drag threshold
let focusedCardId = null;
let canvasMode = 'rts'; // 'rts' or 'terminal'
let focusedTerminalCard = null; // reference to the TerminalCard in terminal mode

// Control groups (1-9): maps group number to array of card IDs
const controlGroups = {};
let lastRecallKey = null;
let lastRecallTime = 0;

const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');
const ctxMenu = document.getElementById('context-menu');

// ════════════════════════════════════════════
// Canvas transform
// ════════════════════════════════════════════
function applyTransform() {
  canvas.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
  document.getElementById('zoom-level').textContent = `${Math.round(zoom * 100)}%`;
  drawMinimap();
}

// ════════════════════════════════════════════
// Pan (drag empty canvas)
// ════════════════════════════════════════════
viewport.addEventListener('dblclick', (e) => {
  if (e.target !== viewport && e.target !== canvas) return;
  fitAll();
});

viewport.addEventListener('pointerdown', (e) => {
  // Right-click can pan from anywhere (including over terminal cards)
  if (e.button === 2) {
    rightClickStart = { x: e.clientX, y: e.clientY };
    isPanning = true;
    viewport.classList.add('panning');
    panStart = { x: e.clientX, y: e.clientY, panX: pan.x, panY: pan.y };
    viewport.setPointerCapture(e.pointerId);
    return;
  }
  // Left-click pan only on empty canvas
  if (e.target !== viewport && e.target !== canvas) return;
  isPanning = true;
  viewport.classList.add('panning');
  panStart = { x: e.clientX, y: e.clientY, panX: pan.x, panY: pan.y };
  viewport.setPointerCapture(e.pointerId);
});
viewport.addEventListener('pointermove', (e) => {
  if (!isPanning) return;
  pan.x = panStart.panX + (e.clientX - panStart.x);
  pan.y = panStart.panY + (e.clientY - panStart.y);
  applyTransform();
});
viewport.addEventListener('pointerup', () => {
  isPanning = false;
  viewport.classList.remove('panning');
});

// ════════════════════════════════════════════
// Zoom (wheel, cursor-centered)
// ════════════════════════════════════════════
viewport.addEventListener('wheel', (e) => {
  // Scroll over terminal = scroll terminal; Ctrl+scroll = zoom canvas
  const overTerminal = e.target.closest('.terminal-card');
  if (overTerminal && !e.ctrlKey) {
    return; // let xterm.js handle the scroll event
  }

  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const oldZoom = zoom;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.min(3, Math.max(0.15, zoom * delta));

  // Adjust pan so zoom centers on cursor
  pan.x = mx - (mx - pan.x) * (zoom / oldZoom);
  pan.y = my - (my - pan.y) * (zoom / oldZoom);
  applyTransform();
}, { passive: false });

// ════════════════════════════════════════════
// Fit all cards in view
// ════════════════════════════════════════════
document.getElementById('btn-fit').addEventListener('click', fitAll);

function fitAll() {
  if (cards.length === 0) return;
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const c of cards) {
    minX = Math.min(minX, c.x);
    minY = Math.min(minY, c.y);
    maxX = Math.max(maxX, c.x + c.w);
    maxY = Math.max(maxY, c.y + c.h);
  }
  const cw = maxX - minX;
  const ch = maxY - minY;
  const pad = 60;
  zoom = Math.min((vw - pad * 2) / cw, (vh - pad * 2) / ch, 1.5);
  pan.x = (vw - cw * zoom) / 2 - minX * zoom;
  pan.y = (vh - ch * zoom) / 2 - minY * zoom;
  applyTransform();
  // Refit all terminals after zoom settles
  setTimeout(() => cards.forEach(c => { if (c.fitAddon) c.fitAddon.fit(); }), 100);
}

// ════════════════════════════════════════════
// Minimap
// ════════════════════════════════════════════
const minimapEl = document.getElementById('minimap');
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');

function drawMinimap() {
  const mw = mmCanvas.width;
  const mh = mmCanvas.height;
  const scaleX = mw / CANVAS_W;
  const scaleY = mh / CANVAS_H;

  mmCtx.clearRect(0, 0, mw, mh);

  // Background
  mmCtx.fillStyle = '#181825';
  mmCtx.fillRect(0, 0, mw, mh);

  // Card symbols
  for (const c of cards) {
    const cx = c.x * scaleX + (c.w * scaleX) / 2;
    const cy = c.y * scaleY + (c.h * scaleY) / 2;
    const stateColor = STATE_COLORS[c.state] || STATE_COLORS.connecting;
    // Card rect
    mmCtx.fillStyle = stateColor + '25';
    mmCtx.fillRect(c.x * scaleX, c.y * scaleY, c.w * scaleX, c.h * scaleY);
    // Symbol
    mmCtx.font = 'bold 10px monospace';
    mmCtx.textAlign = 'center';
    mmCtx.textBaseline = 'middle';
    mmCtx.fillStyle = stateColor;
    mmCtx.fillText(c.symbol, cx, cy);
  }

  // Viewport rect
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const vx = (-pan.x / zoom) * scaleX;
  const vy = (-pan.y / zoom) * scaleY;
  const vfw = (vw / zoom) * scaleX;
  const vfh = (vh / zoom) * scaleY;
  mmCtx.strokeStyle = '#cdd6f4';
  mmCtx.lineWidth = 1.5;
  mmCtx.strokeRect(vx, vy, vfw, vfh);
}

// Click minimap to jump
minimapEl.addEventListener('click', (e) => {
  const rect = mmCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const scaleX = mmCanvas.width / CANVAS_W;
  const scaleY = mmCanvas.height / CANVAS_H;
  const canvasX = mx / scaleX;
  const canvasY = my / scaleY;
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  pan.x = -(canvasX * zoom - vw / 2);
  pan.y = -(canvasY * zoom - vh / 2);
  applyTransform();
});

// ════════════════════════════════════════════
// Context menu (right-click on empty canvas)
// ════════════════════════════════════════════
let ctxMenuCanvasPos = { x: 0, y: 0 };

viewport.addEventListener('contextmenu', (e) => {
  // Only show on empty canvas, not on terminal cards
  if (e.target !== viewport && e.target !== canvas) return;
  e.preventDefault();
  // Suppress menu if user right-click-dragged (panned) beyond threshold
  if (rightClickStart) {
    const dx = e.clientX - rightClickStart.x;
    const dy = e.clientY - rightClickStart.y;
    rightClickStart = null;
    if (Math.sqrt(dx * dx + dy * dy) > 5) return;
  }
  ctxMenuCanvasPos = screenToCanvas(e.clientX, e.clientY);
  showContextMenu(e.clientX, e.clientY);
});

document.addEventListener('click', () => hideContextMenu());
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideContextMenu(); });

function showContextMenu(sx, sy) {
  let html = '<div class="ctx-header">Spawn terminal</div>';
  hubs.forEach((h, i) => {
    const sym = hubSymbolMap[h.hub] || '?';
    const detail = h.container ? ` <span style="color:#585b70;font-size:11px">(${h.container})</span>` : '';
    html += `<div class="ctx-item" data-hub="${h.hub}">
      <span class="symbol-preview">${sym}</span>
      ${h.hub}${detail}
    </div>`;
  });

  // Host terminal section
  html += '<div class="ctx-header">Host terminal</div>';
  const hostShells = [
    { id: 'powershell', label: 'PowerShell', cmd: 'powershell.exe' },
    { id: 'cmd', label: 'Command Prompt', cmd: 'cmd.exe' },
    { id: 'util', label: 'Utility Container', cmd: 'docker.exe exec -it supreme-claudemander-util bash' },
  ];
  for (const shell of hostShells) {
    html += `<div class="ctx-item" data-host-shell="${shell.id}" data-host-cmd="${shell.cmd}">
      <span class="symbol-preview" style="color:#89b4fa">H</span>
      ${shell.label}
    </div>`;
  }

  // Widget section
  const widgetTypes = Object.keys(WIDGET_REGISTRY);
  if (widgetTypes.length > 0) {
    html += '<div class="ctx-header">Spawn widget</div>';
    for (const wt of widgetTypes) {
      const def = WIDGET_REGISTRY[wt];
      html += `<div class="ctx-item" data-widget="${wt}">
        <span class="symbol-preview">W</span>
        ${def.label || wt}
      </div>`;
    }
  }

  ctxMenu.innerHTML = html;
  ctxMenu.style.left = sx + 'px';
  ctxMenu.style.top = sy + 'px';
  ctxMenu.classList.add('visible');

  ctxMenu.querySelectorAll('.ctx-item[data-hub]').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const hubName = item.dataset.hub;
      const hub = hubs.find(h => h.hub === hubName);
      if (hub) spawnCard(hub, ctxMenuCanvasPos.x, ctxMenuCanvasPos.y);
      hideContextMenu();
    });
  });

  ctxMenu.querySelectorAll('.ctx-item[data-host-shell]').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const shellId = item.dataset.hostShell;
      const shellCmd = item.dataset.hostCmd;
      const hub = { hub: shellId, container: 'localhost', exec: shellCmd };
      // Add to hubs if not already there so symbol assignment works
      if (!hubSymbolMap[shellId]) {
        hubSymbolMap[shellId] = 'H';
      }
      spawnCard(hub, ctxMenuCanvasPos.x, ctxMenuCanvasPos.y, CARD_W, CARD_H, null, shellCmd);
      hideContextMenu();
    });
  });

  ctxMenu.querySelectorAll('.ctx-item[data-widget]').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const widgetType = item.dataset.widget;
      spawnWidget(widgetType, ctxMenuCanvasPos.x, ctxMenuCanvasPos.y);
      hideContextMenu();
    });
  });
}

function hideContextMenu() {
  ctxMenu.classList.remove('visible');
}

function screenToCanvas(sx, sy) {
  const rect = viewport.getBoundingClientRect();
  return {
    x: (sx - rect.left - pan.x) / zoom,
    y: (sy - rect.top - pan.y) / zoom,
  };
}

// ════════════════════════════════════════════
// Terminal theme (shared)
// ════════════════════════════════════════════
const TERM_THEME = {
  background: '#1e1e2e',
  foreground: '#cdd6f4',
  cursor: '#f5e0dc',
  selectionBackground: '#585b7066',
  black: '#45475a', red: '#f38ba8', green: '#a6e3a1', yellow: '#f9e2af',
  blue: '#89b4fa', magenta: '#cba6f7', cyan: '#94e2d5', white: '#bac2de',
  brightBlack: '#585b70', brightRed: '#f38ba8', brightGreen: '#a6e3a1', brightYellow: '#f9e2af',
  brightBlue: '#89b4fa', brightMagenta: '#cba6f7', brightCyan: '#94e2d5', brightWhite: '#a6adc8',
};

// ════════════════════════════════════════════
// Card base class
// ════════════════════════════════════════════
class Card {
  static nextId = 0;
  static maxZ = 10;

  constructor({ hub, container, x, y, w, h, symbol, type }) {
    this.id = Card.nextId++;
    this.type = type || 'base';
    this.hub = hub;
    this.container = container;
    this.x = x;
    this.y = y;
    this.w = w || CARD_W;
    this.h = h || CARD_H;
    this.symbol = symbol;
    this.execCmd = null; // overridden by subclasses if needed
    this.state = 'connecting';
    this.lastOutput = 0;
    this.controlGroupNums = []; // array of group numbers (1-9)
    this.el = null;
    this._cancelDrag = null;
    this._cancelResize = null;
  }

  createElement() {
    const el = document.createElement('div');
    el.className = 'terminal-card';
    el.style.left = this.x + 'px';
    el.style.top = this.y + 'px';
    el.style.width = this.w + 'px';
    el.style.height = this.h + 'px';
    el.style.zIndex = ++Card.maxZ;
    el.dataset.cardId = this.id;

    const copyLabel = cards.filter(c => c.hub === this.hub).length;

    // Titlebar
    const titlebar = document.createElement('div');
    titlebar.className = 'terminal-titlebar';
    titlebar.dataset.drag = this.id;

    const symbolSpan = document.createElement('span');
    symbolSpan.className = 'hub-symbol';
    symbolSpan.dataset.symbol = this.id;
    symbolSpan.style.color = STATE_COLORS.connecting;
    symbolSpan.textContent = this.symbol;
    titlebar.appendChild(symbolSpan);

    // Control group badges container
    const badgeContainer = document.createElement('span');
    badgeContainer.className = 'control-group-badges';
    badgeContainer.dataset.cgBadges = this.id;
    titlebar.appendChild(badgeContainer);

    const nameSpan = document.createElement('span');
    nameSpan.className = 'hub-name';
    nameSpan.textContent = this.hub;
    titlebar.appendChild(nameSpan);

    if (copyLabel > 0) {
      const copySpan = document.createElement('span');
      copySpan.style.cssText = 'color:#585b70;font-size:11px';
      copySpan.textContent = '#' + (copyLabel + 1);
      titlebar.appendChild(copySpan);
    }

    const containerSpan = document.createElement('span');
    containerSpan.className = 'container-name';
    containerSpan.textContent = this.container;
    titlebar.appendChild(containerSpan);

    const spacer = document.createElement('span');
    spacer.className = 'spacer';
    titlebar.appendChild(spacer);

    const closeBtn = document.createElement('button');
    closeBtn.className = 'close-btn';
    closeBtn.dataset.close = this.id;
    closeBtn.innerHTML = '&times;';
    titlebar.appendChild(closeBtn);

    el.appendChild(titlebar);

    // Body (subclass hook)
    const body = this.createBody();
    body.dataset.body = this.id;
    el.appendChild(body);

    // Resize handle
    const resizeHandle = document.createElement('div');
    resizeHandle.className = 'resize-handle';
    resizeHandle.dataset.resize = this.id;
    el.appendChild(resizeHandle);

    this.el = el;

    // Focus on click
    el.addEventListener('pointerdown', () => {
      focusCard(this.id);
      el.style.zIndex = ++Card.maxZ;
    });

    // Double-click anywhere on card to zoom-to-fill
    el.addEventListener('dblclick', (e) => {
      if (e.target.closest('.close-btn')) return;
      zoomToCard(this);
    });

    // Close button
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      destroyCard(this.id);
    });

    return el;
  }

  createBody() {
    const body = document.createElement('div');
    body.className = 'terminal-body';
    return body;
  }

  onInit() {}

  onDestroy() {}

  onFocus() { this.el.classList.add('focused'); }

  onBlur() { this.el.classList.remove('focused'); }

  setupDrag() {
    const titlebar = this.el.querySelector(`[data-drag="${this.id}"]`);
    let startX, startY, origX, origY;

    const onMove = (e) => {
      this.x = origX + (e.clientX - startX) / zoom;
      this.y = origY + (e.clientY - startY) / zoom;
      this.el.style.left = this.x + 'px';
      this.el.style.top = this.y + 'px';
      drawMinimap();
    };
    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      saveLayout();
    };

    titlebar.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.close-btn')) return;
      startX = e.clientX;
      startY = e.clientY;
      origX = this.x;
      origY = this.y;
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      e.preventDefault();
      e.stopPropagation();
    });

    this._cancelDrag = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
    };
  }

  setupResize() {
    const handle = this.el.querySelector(`[data-resize="${this.id}"]`);
    let startX, startY, origW, origH;

    const onMove = (e) => {
      this.w = Math.max(300, origW + (e.clientX - startX) / zoom);
      this.h = Math.max(200, origH + (e.clientY - startY) / zoom);
      this.el.style.width = this.w + 'px';
      this.el.style.height = this.h + 'px';
      drawMinimap();
    };
    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      saveLayout();
    };

    handle.addEventListener('pointerdown', (e) => {
      startX = e.clientX;
      startY = e.clientY;
      origW = this.w;
      origH = this.h;
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      e.preventDefault();
      e.stopPropagation();
    });

    this._cancelResize = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
    };
  }

  updateState(newState) {
    this.state = newState;
    if (newState === 'working') this.lastOutput = Date.now();
    const symbolEl = this.el.querySelector(`[data-symbol="${this.id}"]`);
    if (symbolEl) symbolEl.style.color = STATE_COLORS[newState] || STATE_COLORS.connecting;
    drawMinimap();
  }

  serialize() {
    const data = { hub: this.hub, x: this.x, y: this.y, w: this.w, h: this.h, type: this.type, controlGroups: this.controlGroupNums.length > 0 ? [...this.controlGroupNums] : undefined };
    if (this.execCmd) data.exec = this.execCmd;
    if (this.sessionId) data.session_id = this.sessionId;
    return data;
  }

  destroy() {
    this.onDestroy();
    if (this._cancelDrag) this._cancelDrag();
    if (this._cancelResize) this._cancelResize();
    if (this.el && this.el.parentNode) {
      this.el.parentNode.removeChild(this.el);
    }
  }
}

// ════════════════════════════════════════════
// TerminalCard subclass
// ════════════════════════════════════════════
class TerminalCard extends Card {
  constructor(opts) {
    super({ ...opts, type: 'terminal' });
    this.execCmd = opts.exec || null;
    this.sessionId = opts.sessionId || null; // persistent session ID
    this.term = null;
    this.fitAddon = null;
    this.ws = null;
    this.ro = null;
    this._cleanup = null;
    this._reconnectDelay = 1000;
    this._reconnectTimer = null;
    this._intentionalClose = false;
  }

  createBody() {
    const body = document.createElement('div');
    body.className = 'terminal-body';
    return body;
  }

  onInit() {
    this.initTerminal();
    this.connectWs();
    this.setupInput();
    this.setupResizeObserver();
  }

  onDestroy() {
    if (this.ro) this.ro.disconnect();
    this._intentionalClose = true;
    if (this._reconnectTimer) clearTimeout(this._reconnectTimer);
    if (this.ws && this.ws.readyState === WebSocket.OPEN) this.ws.close();
    if (this.term) this.term.dispose();
  }

  initTerminal() {
    this.term = new window.Terminal({
      cursorBlink: true,
      fontSize: 13,
      fontFamily: '"JetBrains Mono","Cascadia Code","Consolas",monospace',
      theme: TERM_THEME,
    });
    this.fitAddon = new window.FitAddon.FitAddon();
    this.term.loadAddon(this.fitAddon);
    if (window.WebLinksAddon) this.term.loadAddon(new window.WebLinksAddon.WebLinksAddon());

    const body = this.el.querySelector(`[data-body="${this.id}"]`);
    this.term.open(body);
    this.fitAddon.fit();
  }

  connectWs() {
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    let wsUrl;
    if (this.sessionId) {
      // Reconnect to existing persistent session
      wsUrl = `${wsProto}//${location.host}/ws/session/${this.sessionId}`;
    } else {
      // Create new persistent session
      const cmd = this.execCmd || `docker.exe exec -it -u vscode -w /workspaces/${this.hub} ${this.container} bash -l`;
      wsUrl = `${wsProto}//${location.host}/ws/session/new?cmd=${encodeURIComponent(cmd)}&hub=${encodeURIComponent(this.hub)}&container=${encodeURIComponent(this.container || '')}`;
    }
    this.ws = new WebSocket(wsUrl);
    this.ws.binaryType = 'arraybuffer';

    this.ws.addEventListener('open', () => {
      this._reconnectDelay = 1000;
      this.updateState('idle');
      this.ws.send(JSON.stringify({ type: 'resize', cols: this.term.cols, rows: this.term.rows }));
    });
    this.ws.addEventListener('message', (ev) => {
      if (typeof ev.data === 'string') {
        // Control message from server (session_id, errors, etc.)
        try {
          const msg = JSON.parse(ev.data);
          if (msg.session_id) {
            this.sessionId = msg.session_id;
            saveLayout();
            if (msg.tmux === false && this.container) {
              this.term.write('\r\n\x1b[33m⚠ tmux not available in container — terminal will not persist across server restarts. Install tmux in the container to enable persistence.\x1b[0m\r\n');
            }
          }
          if (msg.error === 'session_not_found') {
            this.sessionId = null;
            this.connectWs(); // create new session
            return;
          }
        } catch {}
      } else if (ev.data instanceof ArrayBuffer) {
        this.term.write(new Uint8Array(ev.data));
        this.updateState('working');
      }
    });
    this.ws.addEventListener('close', () => {
      this.updateState('dead');
      if (!this._intentionalClose) {
        this.term.write('\r\n\x1b[33m[reconnecting...]\x1b[0m\r\n');
        this._reconnectTimer = setTimeout(() => {
          this._reconnectDelay = Math.min(this._reconnectDelay * 2, 30000);
          this.connectWs();
        }, this._reconnectDelay);
      } else {
        this.term.write('\r\n\x1b[31m[disconnected]\x1b[0m\r\n');
      }
    });
    this.ws.addEventListener('error', () => { this.updateState('dead'); });
  }

  setupInput() {
    const doPaste = () => {
      navigator.clipboard.readText().then(text => {
        if (text && this.ws && this.ws.readyState === WebSocket.OPEN) this.ws.send(new TextEncoder().encode(text));
      });
    };

    this.term.onData((data) => {
      if (this.ws && this.ws.readyState === WebSocket.OPEN) this.ws.send(new TextEncoder().encode(data));
    });

    this.term.attachCustomKeyEventHandler((ev) => {
      if (ev.type !== 'keydown') return true;

      // Escape exits terminal mode — let it bubble to the document handler
      if (ev.key === 'Escape') return false;

      // Copy
      if (ev.ctrlKey && ev.shiftKey && ev.key === 'C') {
        const sel = this.term.getSelection();
        if (sel) navigator.clipboard.writeText(sel);
        return false;
      }
      if (settings.copy === 'ctrl-c-sel' && ev.ctrlKey && !ev.shiftKey && ev.key === 'c') {
        const sel = this.term.getSelection();
        if (sel && sel.length > 0) {
          navigator.clipboard.writeText(sel);
          return false; // intercept Ctrl+C only when there's a selection
        }
      }

      // Paste
      if (ev.ctrlKey && ev.shiftKey && ev.key === 'V') {
        if (settings.paste === 'ctrl-shift-v' || settings.paste === 'both') { doPaste(); return false; }
      }
      if (ev.ctrlKey && !ev.shiftKey && ev.key === 'v') {
        if (settings.paste === 'ctrl-v' || settings.paste === 'both') { doPaste(); return false; }
      }

      return true;
    });

    // Auto-copy on select
    this.term.onSelectionChange(() => {
      if (settings.copy === 'auto-select') {
        const sel = this.term.getSelection();
        if (sel) navigator.clipboard.writeText(sel);
      }
    });

    // Right-click on terminal body
    const body = this.el.querySelector(`[data-body="${this.id}"]`);
    body.addEventListener('contextmenu', (ev) => {
      ev.preventDefault();
      // Only paste on stationary right-click, not after a right-click-drag pan
      if (rightClickStart) {
        const dx = ev.clientX - rightClickStart.x;
        const dy = ev.clientY - rightClickStart.y;
        rightClickStart = null;
        if (Math.sqrt(dx * dx + dy * dy) > 5) return;
      }
      if (settings.rightclick === 'paste') doPaste();
    });
  }

  setupResizeObserver() {
    const body = this.el.querySelector(`[data-body="${this.id}"]`);
    this.ro = new ResizeObserver(() => {
      this.fitAddon.fit();
      if (this.ws && this.ws.readyState === WebSocket.OPEN) {
        this.ws.send(JSON.stringify({ type: 'resize', cols: this.term.cols, rows: this.term.rows }));
      }
    });
    this.ro.observe(body);
  }
}

// LoaderCard subclass
// ════════════════════════════════════════════
class LoaderCard {
  constructor({ scriptName, x, y }) {
    this.scriptName = scriptName;
    this.x = x;
    this.y = y;
    this.el = null;
    this.statusEl = null;
    this.error = false;
  }

  createElement() {
    const el = document.createElement('div');
    el.className = 'loader-card';
    el.style.left = this.x + 'px';
    el.style.top = this.y + 'px';
    el.style.width = '360px';
    el.style.height = '140px';
    el.style.zIndex = 999;

    const titlebar = document.createElement('div');
    titlebar.className = 'loader-titlebar';
    titlebar.textContent = 'Startup';
    el.appendChild(titlebar);

    const body = document.createElement('div');
    body.className = 'loader-body';

    const spinner = document.createElement('div');
    spinner.className = 'loader-spinner';
    body.appendChild(spinner);

    const status = document.createElement('div');
    status.className = 'loader-status';
    status.textContent = `Running: ${this.scriptName}`;
    body.appendChild(status);
    this.statusEl = status;

    el.appendChild(body);
    this.el = el;
    return el;
  }

  setStatus(text) {
    if (this.statusEl) this.statusEl.textContent = text;
  }

  setError(msg) {
    this.error = true;
    if (this.el) this.el.classList.add('error');
    this.setStatus(msg);
  }

  destroy() {
    if (this.el && this.el.parentNode) {
      this.el.parentNode.removeChild(this.el);
    }
  }
}

// ════════════════════════════════════════════
// Widget registry
// ════════════════════════════════════════════
const WIDGET_REGISTRY = {
  'system-info': {
    label: 'System Info',
    defaultRefreshInterval: 10000,
    async render(body, card) {
      try {
        const resp = await fetch('/api/widgets/system-info');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const activeTerminals = cards.filter(c => c.type === 'terminal').length;
        const rows = [
          ['Hostname', data.hostname],
          ['Platform', data.platform],
          ['Python', data.python_version],
          ['Server uptime', data.uptime],
          ['Active terminals', String(activeTerminals)],
          ['Current time', new Date().toLocaleTimeString()],
        ];
        body.innerHTML = rows.map(([label, value]) =>
          `<div class="widget-row"><span class="widget-label">${label}</span><span class="widget-value">${value}</span></div>`
        ).join('');
        card.updateState('working');
      } catch (err) {
        body.innerHTML = `<div class="widget-row"><span class="widget-label" style="color:#f38ba8">Error: ${err.message}</span></div>`;
        card.updateState('dead');
      }
    },
  },
  'claude-usage': {
    label: 'Claude Usage',
    defaultRefreshInterval: 60000,
    async render(body, card) {
      function usageColor(pct) {
        if (pct == null) return '#585b70';
        if (pct < 50) return '#a6e3a1';
        if (pct < 80) return '#f9e2af';
        return '#f38ba8';
      }
      function renderBar(pct) {
        const color = usageColor(pct);
        const width = pct != null ? Math.min(100, Math.max(0, pct)) : 0;
        return `<div class="usage-bar-container"><div class="usage-bar" style="width:${width}%;background:${color}"></div></div>`;
      }
      function renderMetric(label, pct, resets) {
        const pctStr = pct != null ? `${pct}%` : 'N/A';
        const resetStr = resets ? `<span class="usage-reset">resets ${resets}</span>` : '';
        return `<div class="usage-metric"><span class="usage-metric-label">${label}</span><span class="usage-metric-value">${pctStr}</span></div>${renderBar(pct)}${resetStr ? `<div style="text-align:right">${resetStr}</div>` : ''}`;
      }
      const ts = () => new Date().toLocaleTimeString();
      try {
        body.innerHTML = `<div class="usage-status">Fetching usage data... (${ts()})</div>`;
        card.updateState('connecting');
        const resp = await fetch('/api/widgets/claude-usage');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if (data.status === 'error') {
          body.innerHTML = `<div class="usage-status" style="color:#f38ba8">${data.error}</div><div class="usage-status">${ts()}</div>`;
          card.updateState('dead');
          return;
        }
        if (!data.profiles || data.profiles.length === 0) {
          body.innerHTML = `<div class="usage-status">${data.message || 'No profiles found.'}<br><br>Mount ~/.claude-profiles/ to the utility container.</div><div class="usage-status">${ts()}</div>`;
          card.updateState('idle');
          return;
        }
        let html = '';
        for (const p of data.profiles) {
          html += `<div class="usage-profile">`;
          html += `<div class="usage-profile-name">${p.profile}${p.cached ? ' <span class="usage-reset">(cached)</span>' : ''}</div>`;
          if (p.error) {
            html += `<div class="usage-metric"><span class="usage-metric-label" style="color:#f38ba8">${p.error}</span></div>`;
          } else {
            html += renderMetric('5h window', p.five_hour_pct, p.five_hour_resets);
            html += renderMetric('7d window', p.seven_day_pct, p.seven_day_resets);
            if (p.sonnet_week_pct != null) {
              html += renderMetric('Sonnet weekly', p.sonnet_week_pct, p.sonnet_week_resets);
            }
          }
          html += `</div>`;
        }
        html += `<div class="usage-status">Last updated: ${ts()}</div>`;
        html += `<button class="usage-refresh-btn" onclick="this.closest('[data-card-id]')||void 0;fetch('/api/widgets/claude-usage?force=1').then(()=>{const c=cards.find(c=>c.widgetType==='claude-usage');if(c)c.render();})">Refresh now</button>`;
        body.innerHTML = html;
        card.updateState('working');
      } catch (err) {
        body.innerHTML = `<div class="widget-row"><span class="widget-label" style="color:#f38ba8">Error: ${err.message}</span></div><div class="usage-status">${ts()}</div>`;
        card.updateState('dead');
      }
    },
  },

  'credential-manager': {
    label: 'Credential Manager',
    defaultRefreshInterval: 60000,

    // ── Probe a single profile via a headed WebSocket session ────────────────
    // Opens /ws/session/new with the claude-usage command (no container= so
    // tmux-wrapping is skipped). xterm.js IS the terminal — it responds to the
    // capability queries claude-usage sends on startup. Buffers output until
    // the process exits, strips ANSI, extracts JSON, POSTs to probe-result.
    async probeOne(name, utilContainerName, statusEl) {
      const cmd = `docker.exe exec -it ${utilContainerName} claude-usage --claude-dir /profiles/${name} --json`;
      const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      // No container= param — prevents tmux wrapping, gives pexpect a real ConPTY
      const wsUrl = `${wsProto}//${location.host}/ws/session/new?cmd=${encodeURIComponent(cmd)}`;

      if (statusEl) statusEl.textContent = `Probing ${name}…`;

      const output = await new Promise((resolve) => {
        const ws = new WebSocket(wsUrl);
        ws.binaryType = 'arraybuffer';
        const chunks = [];
        const timeout = setTimeout(() => { ws.close(); resolve(chunks.join('')); }, 90000);
        ws.addEventListener('message', (ev) => {
          if (ev.data instanceof ArrayBuffer) {
            chunks.push(new TextDecoder().decode(ev.data));
          }
          // Ignore text control frames (session_id, etc.)
        });
        ws.addEventListener('close', () => { clearTimeout(timeout); resolve(chunks.join('')); });
        ws.addEventListener('error', () => { clearTimeout(timeout); resolve(chunks.join('')); });
      });

      // Strip ANSI escape sequences and carriage returns
      const clean = output.replace(/\x1b(?:[@-Z\\-_]|\[[0-?]*[ -/]*[@-~])/g, '').replace(/\r/g, '').trim();
      const jsonStart = clean.indexOf('{');
      const jsonEnd = clean.lastIndexOf('}');
      if (jsonStart < 0 || jsonEnd <= jsonStart) {
        if (statusEl) statusEl.textContent = `Probe failed for ${name} (no JSON)`;
        return null;
      }
      let parsed;
      try {
        parsed = JSON.parse(clean.slice(jsonStart, jsonEnd + 1));
      } catch {
        if (statusEl) statusEl.textContent = `Probe failed for ${name} (bad JSON)`;
        return null;
      }

      // POST result to backend cache
      try {
        await fetch(`/api/credentials/${encodeURIComponent(name)}/probe-result`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(parsed),
        });
      } catch (_) {}

      return parsed;
    },

    async render(body, card) {
      const ts = () => new Date().toLocaleTimeString();
      const self = WIDGET_REGISTRY['credential-manager'];
      if (!card._probingProfiles) card._probingProfiles = new Set();

      function burnColor(cls) {
        if (cls === 'overburning') return '#f38ba8';
        if (cls === 'stale') return '#585b70';
        if (cls === 'underburning') return '#a6e3a1';
        return '#a6e3a1';
      }

      function getBurnStatus(cred) {
        if (cred.health === 'stale') return { icon: '⚠️', cls: 'stale' };
        if (cred.health === 'unknown') return { icon: '❓', cls: '' };
        const cls = cred.burn_class || 'normal';
        const icons = { overburning: '🔥', normal: '⚡', underburning: '✅' };
        return { icon: icons[cls] || '✅', cls };
      }

      function renderBurnBar(pct, statusCls) {
        const color = burnColor(statusCls);
        const width = pct != null ? Math.min(100, Math.max(0, pct)) : 0;
        return `<div class="cred-burn-bar"><div class="cred-burn-bar-fill" style="width:${width}%;background:${color}"></div></div>`;
      }

      function formatAgo(wallEpoch) {
        if (wallEpoch == null) return null;
        const secs = Math.floor(Date.now() / 1000 - wallEpoch);
        if (secs < 60) return `${secs}s ago`;
        if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
        return `${Math.floor(secs / 3600)}h ago`;
      }

      function buildDetailHtml(cred, statusCls) {
        const rows = [];
        if (cred.usage_5hr_pct != null) rows.push(['5h usage', `${cred.usage_5hr_pct.toFixed(1)}%`]);
        if (cred.usage_daily_pct != null) rows.push(['Daily usage', `${cred.usage_daily_pct.toFixed(1)}%`]);
        if (cred.five_hour_resets != null) rows.push(['5h reset', cred.five_hour_resets]);
        if (cred.seven_day_resets != null) rows.push(['7d reset', cred.seven_day_resets]);
        if (cred.burn_rate != null) rows.push(['Burn rate', `${cred.burn_rate.toFixed(1)}/hr`]);
        if (cred.account_id) rows.push(['Account ID', cred.account_id]);
        if (cred.health) rows.push(['Health', cred.health]);
        const ago = formatAgo(cred.data_timestamp);
        if (ago) rows.push(['Data', ago]);
        let html = rows.map(([l, v]) =>
          `<div class="cred-detail-row"><span class="cred-detail-label">${l}</span><span class="cred-detail-value">${v}</span></div>`
        ).join('');
        html += `<div class="cred-detail-actions">`;
        html += `<button class="cred-probe-btn" data-cred-probe="${cred.name}">Probe usage</button>`;
        html += `<button class="cred-check-btn" data-cred-check="${cred.name}">Health check</button>`;
        if (statusCls === 'stale') {
          html += `<button class="cred-reauth-btn" data-cred-reauth="${cred.name}">Re-authenticate</button>`;
        }
        html += `</div>`;
        return html;
      }

      body.innerHTML = `<div class="usage-status">Loading credentials… (${ts()})</div>`;
      card.updateState('connecting');

      try {
        const resp = await fetch('/api/credentials');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const credentials = data.credentials || [];
        const maxDataAge = data.max_data_age || 900;
        const utilContainerName = data.util_container_name || 'supreme-claudemander-util';

        if (credentials.length === 0) {
          body.innerHTML = `
            <div class="usage-status">No credentials configured.</div>
            <div class="cred-add-form">
              <input type="text" class="cred-name-input" placeholder="Profile name…">
              <button class="cred-add-btn">Add</button>
            </div>
            <div class="cred-footer-msg" style="display:none"></div>`;
          card.updateState('idle');
        } else {
          const enriched = credentials.map(cred => ({ ...cred, _burnStatus: getBurnStatus(cred) }));
          const statusOrder = { overburning: 0, normal: 1, underburning: 2, stale: 3, '': 4 };
          enriched.sort((a, b) => {
            const so = (statusOrder[a._burnStatus.cls] ?? 4) - (statusOrder[b._burnStatus.cls] ?? 4);
            if (so !== 0) return so;
            return (b.burn_rate ?? -1) - (a.burn_rate ?? -1);
          });

          const nowSec = Date.now() / 1000;
          let html = `<div id="cred-list">`;
          for (const cred of enriched) {
            const { icon, cls: statusCls } = cred._burnStatus;
            const dataAge = cred.data_timestamp != null ? nowSec - cred.data_timestamp : null;
            const tooStale = dataAge != null && dataAge > maxDataAge;
            const warnStale = !tooStale && dataAge != null && dataAge > 60;
            const showValues = !tooStale && cred.data_timestamp != null;
            const pct = showValues ? (cred.usage_5hr_pct ?? cred.usage_daily_pct ?? 0) : 0;
            const burnRateStr = showValues && cred.burn_rate != null ? `${cred.burn_rate.toFixed(1)}/hr` : '—';
            const resetStr = showValues && cred.five_hour_resets != null ? `5hr reset: ${cred.five_hour_resets}` : '';
            const ago = formatAgo(cred.data_timestamp);
            const agoClass = warnStale ? 'cred-stale-age warn' : 'cred-stale-age';
            const rowCls = ['cred-row', statusCls].filter(Boolean).join(' ');
            const safeId = cred.name.replace(/[^a-zA-Z0-9_-]/g, '_');
            const noData = cred.data_timestamp == null;

            html += `<div class="${rowCls}" data-cred-toggle="${cred.name}">`;
            html += `<span class="cred-icon">${icon}</span>`;
            html += `<span class="cred-name" title="${cred.name}">${cred.name}</span>`;
            html += `<div class="cred-bar-wrap">`;
            if (noData) {
              const isAutoProbing = card._probingProfiles.has(cred.name);
              html += `<div class="cred-burn-bar"><div class="cred-burn-bar-fill" style="width:0%;background:#585b70"></div></div>`;
              html += `<div class="cred-stats"><span style="color:#585b70">${isAutoProbing ? 'probing…' : 'no data'}</span></div>`;
            } else {
              html += renderBurnBar(pct, statusCls);
              html += `<div class="cred-stats"><span>${burnRateStr}</span><span>${resetStr}</span></div>`;
            }
            html += `</div>`;
            if (ago) html += `<span class="${agoClass}">${ago}</span>`;
            html += `</div>`;
            html += `<div class="cred-detail" id="cred-detail-${safeId}" style="display:none">`;
            html += buildDetailHtml(cred, statusCls);
            html += `</div>`;
          }
          html += `</div>`;
          html += `<div class="cred-probe-status" style="min-height:1.2em;font-size:0.78em;color:#89b4fa;padding:2px 6px;"></div>`;
          html += `<div class="cred-toolbar">`;
          html += `<button class="cred-probe-all-btn">Probe all</button>`;
          html += `<div class="cred-add-form" style="display:inline-flex"><input type="text" class="cred-name-input" placeholder="New profile name…"><button class="cred-add-btn">Add</button></div>`;
          html += `</div>`;
          html += `<div class="cred-footer-msg" style="display:none"></div>`;
          body.innerHTML = html;
          card.updateState('working');
        }

        const probeStatusEl = body.querySelector('.cred-probe-status');

        // Toggle detail rows
        body.querySelectorAll('[data-cred-toggle]').forEach(row => {
          row.addEventListener('click', () => {
            const safeId = row.getAttribute('data-cred-toggle').replace(/[^a-zA-Z0-9_-]/g, '_');
            const detail = body.querySelector(`#cred-detail-${safeId}`);
            if (detail) detail.style.display = detail.style.display === 'none' ? '' : 'none';
          });
        });

        // Per-credential Probe button
        body.querySelectorAll('[data-cred-probe]').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const name = btn.getAttribute('data-cred-probe');
            btn.disabled = true; btn.textContent = 'Probing…';
            card.updateState('working');
            await self.probeOne(name, utilContainerName, probeStatusEl);
            await self.render(body, card);
          });
        });

        // Per-credential health check button
        body.querySelectorAll('[data-cred-check]').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const name = btn.getAttribute('data-cred-check');
            btn.disabled = true; btn.textContent = 'Checking…';
            try { await fetch(`/api/credentials/${encodeURIComponent(name)}/check`, { method: 'POST' }); } catch (_) {}
            await self.render(body, card);
          });
        });

        // Re-auth button (stale credentials)
        body.querySelectorAll('[data-cred-reauth]').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const name = btn.getAttribute('data-cred-reauth');
            btn.disabled = true; btn.textContent = 'Checking…';
            try { await fetch(`/api/credentials/${encodeURIComponent(name)}/check`, { method: 'POST' }); } catch (_) {}
            await self.render(body, card);
          });
        });

        // Probe all button — sequential to avoid hammering the util container
        const probeAllBtn = body.querySelector('.cred-probe-all-btn');
        if (probeAllBtn) {
          probeAllBtn.addEventListener('click', async () => {
            probeAllBtn.disabled = true; probeAllBtn.textContent = 'Probing…';
            card.updateState('working');
            const resp2 = await fetch('/api/credentials').catch(() => null);
            const data2 = resp2 ? await resp2.json().catch(() => ({})) : {};
            const names = (data2.credentials || []).map(c => c.name);
            const util2 = data2.util_container_name || utilContainerName;
            for (const name of names) {
              await self.probeOne(name, util2, probeStatusEl);
            }
            if (probeStatusEl) probeStatusEl.textContent = `Probe complete — ${names.length} profile(s)`;
            await self.render(body, card);
          });
        }

        const addBtn = body.querySelector('.cred-add-btn');
        const nameInput = body.querySelector('.cred-name-input');
        const footerMsg = body.querySelector('.cred-footer-msg');
        if (addBtn && nameInput) {
          addBtn.addEventListener('click', async () => {
            const name = nameInput.value.trim();
            if (!name) { nameInput.focus(); return; }
            addBtn.disabled = true; addBtn.textContent = '…';
            try {
              const r = await fetch('/api/credentials', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name }),
              });
              if (!r.ok) {
                const e = await r.json().catch(() => ({}));
                if (footerMsg) { footerMsg.style.display = ''; footerMsg.style.color = '#f38ba8'; footerMsg.textContent = e.error || `Error ${r.status}`; }
                addBtn.disabled = false; addBtn.textContent = 'Add';
                return;
              }
              if (footerMsg) { footerMsg.style.display = ''; footerMsg.style.color = '#a6e3a1'; footerMsg.textContent = `Profile "${name}" created — probing automatically.`; }
              await self.render(body, card);
            } catch (err) {
              if (footerMsg) { footerMsg.style.display = ''; footerMsg.style.color = '#f38ba8'; footerMsg.textContent = `Error: ${err.message}`; }
              addBtn.disabled = false; addBtn.textContent = 'Add';
            }
          });
          nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
        }

        // Auto-probe: fire probes for profiles with no data or stale data (>15 min).
        // The service card is the sole probe initiator — no other card ever calls probeOne().
        // Probes are fire-and-forget; guard with card._probingProfiles to prevent re-entrant probes.
        const AUTO_PROBE_STALE_SEC = 15 * 60;
        const nowForProbe = Date.now() / 1000;
        const toProbe = credentials.filter(cred =>
          !card._probingProfiles.has(cred.name) &&
          (cred.data_timestamp == null || (nowForProbe - cred.data_timestamp) > AUTO_PROBE_STALE_SEC)
        );
        for (const cred of toProbe) {
          card._probingProfiles.add(cred.name);
          (async () => {
            await self.probeOne(cred.name, utilContainerName, probeStatusEl);
            card._probingProfiles.delete(cred.name);
            await self.render(body, card);
          })();
        }

      } catch (err) {
        body.innerHTML = `<div class="widget-row"><span class="widget-label" style="color:#f38ba8">Error: ${err.message}</span></div><div class="usage-status">${ts()}</div>`;
        card.updateState('dead');
      }
    },
  },
};

// ════════════════════════════════════════════
// WidgetCard subclass
// ════════════════════════════════════════════
class WidgetCard extends Card {
  constructor(opts) {
    super({ ...opts, type: 'widget', hub: opts.hub || opts.widgetType, container: '', symbol: opts.symbol || 'W' });
    this.widgetType = opts.widgetType;
    this.refreshInterval = opts.refreshInterval || (WIDGET_REGISTRY[opts.widgetType]?.defaultRefreshInterval) || 30000;
    this._refreshTimer = null;
  }

  createBody() {
    const body = document.createElement('div');
    body.className = 'terminal-body widget-body';
    return body;
  }

  onInit() {
    this.render();
    this._refreshTimer = setInterval(() => this.render(), this.refreshInterval);
  }

  onDestroy() {
    if (this._refreshTimer) clearInterval(this._refreshTimer);
  }

  async render() {
    const body = this.el.querySelector(`[data-body="${this.id}"]`);
    if (!body) return;
    const widgetDef = WIDGET_REGISTRY[this.widgetType];
    if (widgetDef && widgetDef.render) {
      await widgetDef.render(body, this);
    } else {
      body.innerHTML = `<div class="widget-row"><span class="widget-label" style="color:#f38ba8">Unknown widget: ${this.widgetType}</span></div>`;
    }
  }

  serialize() {
    const data = super.serialize();
    data.widgetType = this.widgetType;
    data.refreshInterval = this.refreshInterval;
    return data;
  }
}

// ════════════════════════════════════════════
// Terminal state management
// ════════════════════════════════════════════
function updateCardState(id, state) {
  const card = cards.find(c => c.id === id);
  if (!card) return;
  card.updateState(state);
}

// Periodic check: transition "working" → "idle" after IDLE_THRESHOLD_MS of no output
setInterval(() => {
  const now = Date.now();
  for (const c of cards) {
    if (c.state === 'working' && (now - c.lastOutput) > IDLE_THRESHOLD_MS) {
      c.updateState('idle');
    }
  }
}, 1000);

// ════════════════════════════════════════════
// Spawn a terminal card
// ════════════════════════════════════════════
function spawnCard(hub, x, y, w, h, savedControlGroups, execCmd, sessionId) {
  const symbol = hubSymbolMap[hub.hub] || '?';
  const card = new TerminalCard({ hub: hub.hub, container: hub.container, x, y, w, h, symbol, exec: execCmd || hub.exec || null, sessionId: sessionId || null });
  if (savedControlGroups && Array.isArray(savedControlGroups)) {
    card.controlGroupNums = [...savedControlGroups];
  }
  card.createElement();
  canvas.appendChild(card.el);
  cards.push(card);
  card.setupDrag();
  card.setupResize();
  card.onInit();
  if (card.controlGroupNums.length > 0) {
    updateControlGroupBadges(card);
  }
  drawMinimap();
  updateHubCount();
  return card;
}

function spawnWidget(widgetType, x, y, w, h) {
  const card = new WidgetCard({
    widgetType,
    x,
    y,
    w: w || 360,
    h: h || 280,
    symbol: 'W',
  });
  card.createElement();
  canvas.appendChild(card.el);
  cards.push(card);
  card.setupDrag();
  card.setupResize();
  card.onInit();
  drawMinimap();
  updateHubCount();
  return card;
}

function destroyCard(id) {
  const idx = cards.findIndex(c => c.id === id);
  if (idx === -1) return;
  const card = cards[idx];
  card.destroy();
  cards.splice(idx, 1);
  saveLayout();
  drawMinimap();
  updateHubCount();
}

function focusCard(id) {
  focusedCardId = id;
  cards.forEach(c => {
    if (c.id === id) { c.onFocus(); } else { c.onBlur(); }
  });
}

function updateHubCount() {
  const termCount = cards.filter(c => c.type === 'terminal').length;
  const widgetCount = cards.filter(c => c.type === 'widget').length;
  const parts = [`${hubs.length} hub(s)`, `${termCount} terminal(s)`];
  if (widgetCount > 0) parts.push(`${widgetCount} widget(s)`);
  document.getElementById('hub-count').textContent = parts.join(' | ');
}

// ════════════════════════════════════════════
// Zoom to card
// ════════════════════════════════════════════
function zoomToCard(card) {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const pad = 40;
  zoom = Math.min((vw - pad * 2) / card.w, (vh - pad * 2) / card.h, 2);
  pan.x = (vw - card.w * zoom) / 2 - card.x * zoom;
  pan.y = (vh - card.h * zoom) / 2 - card.y * zoom;
  applyTransform();
  setTimeout(() => { if (card.fitAddon) card.fitAddon.fit(); }, 100);
}

// ════════════════════════════════════════════
// Control groups
// ════════════════════════════════════════════
function updateControlGroupBadges(card) {
  const container = card.el.querySelector(`[data-cg-badges="${card.id}"]`);
  if (!container) return;
  container.innerHTML = '';
  for (const num of card.controlGroupNums.sort((a, b) => a - b)) {
    const badge = document.createElement('span');
    badge.className = 'control-group-badge';
    badge.textContent = num;
    container.appendChild(badge);
  }
}

function flashControlGroupBadges(card) {
  const container = card.el.querySelector(`[data-cg-badges="${card.id}"]`);
  if (!container) return;
  container.querySelectorAll('.control-group-badge').forEach(badge => {
    badge.classList.remove('flash');
    // Force reflow to restart animation
    void badge.offsetWidth;
    badge.classList.add('flash');
  });
}

function assignControlGroup(groupNum) {
  const selected = cards.filter(c => c.el.classList.contains('focused'));
  if (selected.length === 0) return;

  // Remove previous members of this group
  const prevIds = controlGroups[groupNum] || [];
  for (const id of prevIds) {
    const card = cards.find(c => c.id === id);
    if (card) {
      card.controlGroupNums = card.controlGroupNums.filter(n => n !== groupNum);
      updateControlGroupBadges(card);
    }
  }

  // Assign selected cards to this group
  const newIds = selected.map(c => c.id);
  controlGroups[groupNum] = newIds;
  for (const card of selected) {
    if (!card.controlGroupNums.includes(groupNum)) {
      card.controlGroupNums.push(groupNum);
    }
    updateControlGroupBadges(card);
    flashControlGroupBadges(card);
  }
  saveLayout();
}

function recallControlGroup(groupNum, doubleTap) {
  const ids = controlGroups[groupNum];
  if (!ids || ids.length === 0) return;

  const groupCards = ids.map(id => cards.find(c => c.id === id)).filter(Boolean);
  if (groupCards.length === 0) return;

  // Select those cards, deselect others
  cards.forEach(c => c.onBlur());
  groupCards.forEach(c => c.onFocus());
  if (groupCards.length > 0) focusedCardId = groupCards[groupCards.length - 1].id;

  // Zoom to fit the group
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const c of groupCards) {
    minX = Math.min(minX, c.x);
    minY = Math.min(minY, c.y);
    maxX = Math.max(maxX, c.x + c.w);
    maxY = Math.max(maxY, c.y + c.h);
  }
  const cw = maxX - minX;
  const ch = maxY - minY;
  const pad = doubleTap ? 20 : 60;
  const maxZoom = doubleTap ? 2 : 1.5;
  zoom = Math.min((vw - pad * 2) / cw, (vh - pad * 2) / ch, maxZoom);
  pan.x = (vw - cw * zoom) / 2 - minX * zoom;
  pan.y = (vh - ch * zoom) / 2 - minY * zoom;
  applyTransform();
  setTimeout(() => groupCards.forEach(c => { if (c.fitAddon) c.fitAddon.fit(); }), 100);
}

function rebuildControlGroupsFromCards() {
  // Clear existing
  for (const key of Object.keys(controlGroups)) delete controlGroups[key];
  for (const card of cards) {
    for (const num of card.controlGroupNums) {
      if (!controlGroups[num]) controlGroups[num] = [];
      controlGroups[num].push(card.id);
    }
    updateControlGroupBadges(card);
  }
}

// ════════════════════════════════════════════
// Initial layout: 3x2 grid centered on canvas
// ════════════════════════════════════════════
function layoutGrid(hubList) {
  const cols = 3;
  const totalW = cols * CARD_W + (cols - 1) * CARD_GAP;
  const rows = Math.ceil(hubList.length / cols);
  const totalH = rows * CARD_H + (rows - 1) * CARD_GAP;
  const startX = (CANVAS_W - totalW) / 2;
  const startY = (CANVAS_H - totalH) / 2;

  hubList.forEach((hub, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = startX + col * (CARD_W + CARD_GAP);
    const y = startY + row * (CARD_H + CARD_GAP);
    spawnCard(hub, x, y);
  });
}

async function loadSettings() {
  try {
    const resp = await fetch('/api/config');
    if (resp.ok) {
      const data = await resp.json();
      // Map server keys to UI: idle_threshold -> idle for backward compat
      settings.copy = data.copy || DEFAULT_SETTINGS.copy;
      settings.paste = data.paste || DEFAULT_SETTINGS.paste;
      settings.rightclick = data.rightclick || DEFAULT_SETTINGS.rightclick;
      settings.idle_threshold = data.idle_threshold ?? DEFAULT_SETTINGS.idle_threshold;
      settings.default_canvas = data.default_canvas || DEFAULT_SETTINGS.default_canvas;
      settings.theme = data.theme || DEFAULT_SETTINGS.theme;
    }
  } catch (err) {
    console.warn('Failed to load settings from server, using defaults:', err);
  }
  applySettingsToUI();
  applySettingsToState();
}

async function saveSettings() {
  try {
    await fetch('/api/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(settings),
    });
  } catch (err) {
    console.warn('Failed to save settings to server:', err);
  }
  applySettingsToState();
}

function applySettingsToUI() {
  document.getElementById('setting-copy').value = settings.copy;
  document.getElementById('setting-paste').value = settings.paste;
  document.getElementById('setting-rightclick').value = settings.rightclick;
  document.getElementById('setting-idle').value = String(settings.idle_threshold);
}

function applySettingsToState() {
  IDLE_THRESHOLD_MS = settings.idle_threshold * 1000;
}

function resetSettings() {
  settings = { ...DEFAULT_SETTINGS };
  saveSettings();
  applySettingsToUI();
}
