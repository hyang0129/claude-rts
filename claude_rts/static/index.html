// ════════════════════════════════════════════
// Mode switching (RTS / Terminal)
// ════════════════════════════════════════════
const modeIndicator = document.getElementById('mode-indicator');

function setMode(mode, termCard) {
  canvasMode = mode;
  modeIndicator.textContent = mode === 'rts' ? 'RTS' : 'TERMINAL';
  modeIndicator.className = mode;
  if (mode === 'terminal' && termCard) {
    focusedTerminalCard = termCard;
    if (termCard.term) termCard.term.focus();
  } else {
    if (focusedTerminalCard && focusedTerminalCard.term) {
      focusedTerminalCard.term.blur();
    }
    focusedTerminalCard = null;
  }
}

// Click on terminal body -> enter Terminal mode
viewport.addEventListener('pointerdown', (e) => {
  // Only left-click enters terminal mode
  if (e.button !== 0) return;
  const termBody = e.target.closest('.terminal-body');
  if (termBody) {
    const cardId = parseInt(termBody.dataset.body);
    const card = cards.find(c => c.id === cardId);
    if (card && card.term) {
      setMode('terminal', card);
      return;
    }
  }
  // Click on empty canvas -> enter RTS mode
  if (e.target === viewport || e.target === canvas) {
    setMode('rts');
  }
}, true); // capture phase so it fires before xterm's handlers

// ════════════════════════════════════════════
// Keyboard shortcuts
// ════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  // Ctrl+0: fit all (works in both modes)
  if (e.ctrlKey && e.key === '0') {
    e.preventDefault();
    fitAll();
    return;
  }
  // Ctrl+Tab: cycle canvases (works in both modes)
  if (e.ctrlKey && e.key === 'Tab') {
    e.preventDefault();
    if (canvasList.length > 1) {
      const idx = canvasList.indexOf(currentCanvasName);
      const next = e.shiftKey
        ? (idx - 1 + canvasList.length) % canvasList.length
        : (idx + 1) % canvasList.length;
      switchCanvas(canvasList[next]);
    }
    return;
  }
  // Escape: switch to RTS mode and deselect
  if (e.key === 'Escape') {
    setMode('rts');
    focusedCardId = null;
    cards.forEach(c => c.onBlur());
    return;
  }

  // ── RTS-only keybindings ──
  if (canvasMode !== 'rts') return;
  // Ignore if typing in an input/textarea
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  // Ctrl+1-9: assign control group (before the modifier bail-out)
  if (e.ctrlKey && !e.metaKey && !e.altKey && e.key >= '1' && e.key <= '9') {
    e.preventDefault();
    assignControlGroup(parseInt(e.key));
    return;
  }

  // Ignore if modifier keys are held (let browser/OS shortcuts work)
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  // 1-9: recall control group
  if (e.key >= '1' && e.key <= '9') {
    e.preventDefault();
    const groupNum = parseInt(e.key);
    const now = Date.now();
    const doubleTap = (lastRecallKey === e.key && (now - lastRecallTime) < 300);
    lastRecallKey = e.key;
    lastRecallTime = now;
    recallControlGroup(groupNum, doubleTap);
    return;
  }

  if (e.key === 'a' || e.key === 'A') {
    // Select all cards
    e.preventDefault();
    cards.forEach(c => c.onFocus());
    if (cards.length > 0) focusedCardId = cards[cards.length - 1].id;
    return;
  }

  if (e.key === 'f' || e.key === 'F') {
    // Fit all
    e.preventDefault();
    fitAll();
    return;
  }

  if (e.key === ' ') {
    // Center on focused/selected card
    e.preventDefault();
    const focused = cards.find(c => c.id === focusedCardId);
    if (focused) {
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;
      pan.x = (vw / 2) - (focused.x + focused.w / 2) * zoom;
      pan.y = (vh / 2) - (focused.y + focused.h / 2) * zoom;
      applyTransform();
    }
    return;
  }

  if (e.key === 'Delete') {
    // Close selected/focused card(s)
    e.preventDefault();
    const selected = cards.filter(c => c.el.classList.contains('focused'));
    if (selected.length > 0) {
      // Destroy in reverse to avoid index issues
      [...selected].reverse().forEach(c => destroyCard(c.id));
    }
    return;
  }
});

// ════════════════════════════════════════════
// Layout persistence (server-side canvases)
// ════════════════════════════════════════════
let currentCanvasName = 'main';
let canvasList = [];  // list of available canvas names

function saveLayout() {
  const data = {
    name: currentCanvasName,
    canvas_size: [CANVAS_W, CANVAS_H],
    cards: cards.map(c => c.serialize()),
  };
  fetch(`/api/canvases/${encodeURIComponent(currentCanvasName)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  }).catch(err => console.warn('Failed to save layout:', err));
}

async function loadLayout() {
  try {
    const resp = await fetch(`/api/canvases/${encodeURIComponent(currentCanvasName)}`);
    if (!resp.ok) return null;
    const data = await resp.json();
    return data.cards || null;
  } catch {
    return null;
  }
}

// ════════════════════════════════════════════
// Canvas switcher
// ════════════════════════════════════════════
const canvasSwitcherBtn = document.getElementById('canvas-switcher-btn');
const canvasDropdown = document.getElementById('canvas-dropdown');
const canvasSwitcherLabel = document.getElementById('canvas-switcher-label');

function updateCanvasSwitcherLabel() {
  canvasSwitcherLabel.textContent = currentCanvasName;
}

async function refreshCanvasList() {
  try {
    const resp = await fetch('/api/canvases');
    if (resp.ok) canvasList = await resp.json();
  } catch (err) {
    console.warn('Failed to fetch canvas list:', err);
  }
  // Ensure current canvas is in the list
  if (!canvasList.includes(currentCanvasName)) {
    canvasList.push(currentCanvasName);
    canvasList.sort();
  }
}

function renderCanvasDropdown() {
  let html = '';
  for (const name of canvasList) {
    const active = name === currentCanvasName ? ' active' : '';
    const deleteBtn = name === 'main' ? '' :
      `<button class="delete-canvas-btn" data-delete-canvas="${name}" title="Delete canvas">&times;</button>`;
    html += `<div class="canvas-dropdown-item${active}" data-switch-canvas="${name}">
      <span class="canvas-label">${name}</span>${deleteBtn}
    </div>`;
  }
  html += '<div class="canvas-dropdown-sep"></div>';
  html += '<div class="canvas-dropdown-action" id="canvas-new-action">+ New canvas</div>';
  html += '<div class="canvas-dropdown-action" id="canvas-rename-action">Rename current</div>';
  canvasDropdown.innerHTML = html;

  // Switch handlers
  canvasDropdown.querySelectorAll('[data-switch-canvas]').forEach(item => {
    item.addEventListener('click', (e) => {
      if (e.target.closest('.delete-canvas-btn')) return;
      const name = item.dataset.switchCanvas;
      if (name !== currentCanvasName) switchCanvas(name);
      hideCanvasDropdown();
    });
  });

  // Delete handlers
  canvasDropdown.querySelectorAll('.delete-canvas-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const name = btn.dataset.deleteCanvas;
      if (!confirm(`Delete canvas "${name}"?`)) return;
      try {
        const resp = await fetch(`/api/canvases/${encodeURIComponent(name)}`, { method: 'DELETE' });
        if (resp.ok) {
          await refreshCanvasList();
          if (currentCanvasName === name) {
            await switchCanvas('main');
          }
          renderCanvasDropdown();
        }
      } catch (err) {
        console.warn('Failed to delete canvas:', err);
      }
    });
  });

  // New canvas
  const newAction = canvasDropdown.querySelector('#canvas-new-action');
  if (newAction) {
    newAction.addEventListener('click', async () => {
      hideCanvasDropdown();
      const name = prompt('New canvas name (letters, numbers, hyphens, underscores):');
      if (!name || !/^[a-zA-Z0-9_-]+$/.test(name)) {
        if (name !== null) alert('Invalid canvas name. Use only letters, numbers, hyphens, underscores.');
        return;
      }
      // Save current canvas first, then switch to the new empty canvas
      saveLayout();
      // Create an empty canvas on the server
      await fetch(`/api/canvases/${encodeURIComponent(name)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, canvas_size: [CANVAS_W, CANVAS_H], cards: [] }),
      });
      await switchCanvas(name);
    });
  }

  // Rename canvas
  const renameAction = canvasDropdown.querySelector('#canvas-rename-action');
  if (renameAction) {
    renameAction.addEventListener('click', async () => {
      hideCanvasDropdown();
      const newName = prompt('Rename canvas to:', currentCanvasName);
      if (!newName || newName === currentCanvasName || !/^[a-zA-Z0-9_-]+$/.test(newName)) {
        if (newName !== null && newName !== currentCanvasName) alert('Invalid canvas name.');
        return;
      }
      // Save current layout under the new name, delete the old one
      const oldName = currentCanvasName;
      const layoutData = {
        name: newName,
        canvas_size: [CANVAS_W, CANVAS_H],
        cards: cards.map(c => c.serialize()),
      };
      await fetch(`/api/canvases/${encodeURIComponent(newName)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(layoutData),
      });
      if (oldName !== 'main') {
        await fetch(`/api/canvases/${encodeURIComponent(oldName)}`, { method: 'DELETE' });
      }
      currentCanvasName = newName;
      updateCanvasSwitcherLabel();
      await refreshCanvasList();
    });
  }
}

function showCanvasDropdown() {
  renderCanvasDropdown();
  canvasDropdown.classList.add('visible');
}

function hideCanvasDropdown() {
  canvasDropdown.classList.remove('visible');
}

canvasSwitcherBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (canvasDropdown.classList.contains('visible')) {
    hideCanvasDropdown();
  } else {
    showCanvasDropdown();
  }
});

document.addEventListener('click', () => hideCanvasDropdown());
canvasDropdown.addEventListener('click', (e) => e.stopPropagation());

async function switchCanvas(name) {
  // 1. Save current layout
  saveLayout();

  // 2. Destroy all current cards
  while (cards.length > 0) {
    const card = cards.pop();
    card.destroy();
  }
  focusedCardId = null;

  // 3. Update current canvas name
  currentCanvasName = name;
  updateCanvasSwitcherLabel();
  await refreshCanvasList();

  // 4. Load the new canvas layout
  const saved = await loadLayout();
  if (saved && saved.length > 0) {
    for (const s of saved) {
      if (s.type === 'widget' && s.widgetType) {
        spawnWidget(s.widgetType, s.x, s.y, s.w, s.h);
      } else {
        const hub = hubs.find(h => h.hub === s.hub);
        if (hub) spawnCard(hub, s.x, s.y, s.w, s.h, s.controlGroups, s.exec, s.session_id);
      }
    }
    rebuildControlGroupsFromCards();
  }

  // 5. Fit view
  if (cards.length > 0) {
    setTimeout(fitAll, 200);
  }

  drawMinimap();
  updateHubCount();
}

// ════════════════════════════════════════════
// Boot
// ════════════════════════════════════════════
(async function() {
  // Load settings first (determines default_canvas)
  await loadSettings();
  currentCanvasName = settings.default_canvas || 'main';
  updateCanvasSwitcherLabel();

  // Load canvas list
  await refreshCanvasList();

  // Show a LoaderCard during startup
  const loaderX = (CANVAS_W - 360) / 2;
  const loaderY = (CANVAS_H - 140) / 2;
  const scriptName = settings.startup_script || 'discover-devcontainers';
  const loader = new LoaderCard({ scriptName, x: loaderX, y: loaderY });
  loader.createElement();
  canvas.appendChild(loader.el);

  // Center on loader
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  pan.x = (vw - 360) / 2 - loaderX;
  pan.y = (vh - 140) / 2 - loaderY;
  applyTransform();

  let startupCards = [];
  let startupError = false;

  try {
    const resp = await fetch('/api/startup');
    const data = await resp.json();
    if (data.status === 'error') {
      loader.setError(`Startup failed: ${data.error}`);
      startupError = true;
      // Wait a moment so user sees the error, then fall back to /api/hubs
      await new Promise(r => setTimeout(r, 2000));
    } else {
      startupCards = data.cards || [];
    }
  } catch (err) {
    loader.setError(`Startup failed: ${err.message}`);
    startupError = true;
    await new Promise(r => setTimeout(r, 2000));
  }

  // If startup returned cards, convert them to hub format
  if (startupCards.length > 0) {
    hubs = startupCards.map(c => ({
      hub: c.name,
      container: c.container || '',
      exec: c.exec || null,
    }));
  } else if (startupError || startupCards.length === 0) {
    // Fallback: try legacy /api/hubs discovery
    loader.setStatus('Falling back to hub discovery...');
    try {
      const resp = await fetch('/api/hubs');
      const hubData = await resp.json();
      hubs = hubData.map(h => ({
        ...h,
        exec: `docker.exe exec -it -u vscode -w /workspaces/${h.hub} ${h.container} bash -l`,
      }));
    } catch {
      hubs = [];
    }
  }

  // Remove loader card
  loader.destroy();

  if (hubs.length === 0) {
    document.getElementById('hub-count').textContent = 'No containers running';
    return;
  }

  // Assign symbols to hubs
  hubs.forEach((h, i) => {
    hubSymbolMap[h.hub] = HUB_SYMBOLS[i % HUB_SYMBOLS.length];
  });

  // Restore saved layout or use default grid
  const saved = await loadLayout();
  if (saved && saved.length > 0) {
    // Spawn cards from saved layout
    for (const s of saved) {
      if (s.type === 'widget' && s.widgetType) {
        spawnWidget(s.widgetType, s.x, s.y, s.w, s.h);
      } else {
        const hub = hubs.find(h => h.hub === s.hub);
        if (hub) spawnCard(hub, s.x, s.y, s.w, s.h, s.controlGroups, s.exec, s.session_id);
      }
    }
    // Spawn any new hubs not in saved layout
    for (const hub of hubs) {
      if (!saved.some(s => s.hub === hub.hub && s.type !== 'widget')) {
        spawnCard(hub, 100 + Math.random() * 200, 100 + Math.random() * 200);
      }
    }
    rebuildControlGroupsFromCards();
  } else {
    layoutGrid(hubs);
  }

  // Center viewport on the cards
  setTimeout(fitAll, 200);
})();
</script>
</body>
</html>
