            if (!failed) setTimeout(() => card.render(), 2000);
          });
        });

        // ── Stop container ──
        body.querySelectorAll('[data-vm-stop]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const name = btn.getAttribute('data-vm-stop');
            btn.textContent = '⏳';
            btn.disabled = true;
            let failed = false;
            try {
              const r = await fetch(`/api/vms/${encodeURIComponent(name)}/stop`, { method: 'POST' });
              if (!r.ok) {
                const err = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
                console.error('Failed to stop:', err);
                btn.textContent = '✗';
                btn.title = err.error || 'Stop failed';
                btn.style.color = '#f38ba8';
                btn.disabled = false;
                failed = true;
              }
            } catch (err) {
              console.error('Stop error:', err);
              btn.textContent = '✗';
              btn.title = err.message || 'Stop failed';
              btn.style.color = '#f38ba8';
              btn.disabled = false;
              failed = true;
            }
            // Refresh after a short delay to let container stop
            if (!failed) setTimeout(() => card.render(), 2000);
          });
        });

        // ── Action buttons ──
        body.querySelectorAll('[data-vm-action]').forEach(btn => {
          btn.addEventListener('click', () => {
            const name = btn.getAttribute('data-vm-action');
            const idx = parseInt(btn.getAttribute('data-action-idx'), 10);
            const fav = favorites.find(f => f.name === name);
            if (!fav) return;
            const act = (fav.actions || [])[idx];
            if (!act) return;

            const discovered = containerMap[name];
            if (!discovered || discovered.state !== 'online') return;

            const _docker = (navigator.platform.startsWith('Win') || navigator.userAgent.includes('Windows')) ? 'docker.exe' : 'docker';
            let cmd;

            if (act.shell_prefix) {
              // Resolve import_keys
              let prefix = act.shell_prefix;
              if (act.import_keys && Array.isArray(act.import_keys)) {
                for (const key of act.import_keys) {
                  if (key === 'priority_credential' && priorityProfile) {
                    prefix = prefix.replace('${priority_credential}', priorityProfile);
                  }
                }
              }
              cmd = `${_docker} exec -it ${name} sh -c '${prefix.replace(/'/g, "'\\''")}'`;
            } else {
              // Default: attach terminal to container (sh for compatibility — works on Alpine, busybox, etc.)
              cmd = `${_docker} exec -it ${name} sh`;
            }

            // Place near center of viewport
            const vw = viewport.clientWidth;
            const vh = viewport.clientHeight;
            const cx = (-pan.x + vw / 2) / zoom;
            const cy = (-pan.y + vh / 2) / zoom;
            CARD_TYPE_REGISTRY.spawn('terminal', {
              hub: name,
              container: name,
              exec: cmd,
              x: cx - 480 + Math.random() * 60,
              y: cy - 320 + Math.random() * 60,
              w: 960,
              h: 640,
            });
          });
        });

        // ── Configure actions ──
        body.querySelectorAll('[data-vm-configure]').forEach(btn => {
          btn.addEventListener('click', () => {
            const name = btn.getAttribute('data-vm-configure');
            const fav = favorites.find(f => f.name === name);
            if (!fav) return;

            // Simple inline editor for actions
            const dialog = document.createElement('div');
            dialog.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100000';
            const box = document.createElement('div');
            box.style.cssText = 'background:#1e1e2e;border:1px solid #45475a;border-radius:8px;padding:16px;min-width:400px;max-width:600px;color:#cdd6f4;font-size:12px';
            box.innerHTML = `
              <div style="font-weight:bold;margin-bottom:8px">Configure actions for ${esc(name)}</div>
              <div style="margin-bottom:8px;color:#6c7086;font-size:11px">Edit the JSON array of actions. Each action: { "label": "...", "type": "terminal", "shell_prefix": "...", "import_keys": [...] }</div>
              <textarea data-actions-json style="width:100%;height:150px;background:#11111b;border:1px solid #45475a;color:#cdd6f4;border-radius:4px;padding:8px;font-family:monospace;font-size:11px;resize:vertical">${esc(JSON.stringify(fav.actions || [], null, 2))}</textarea>
              <div style="display:flex;gap:8px;margin-top:8px;justify-content:flex-end">
                <button data-cancel style="background:none;border:1px solid #45475a;color:#cdd6f4;border-radius:4px;padding:4px 12px;cursor:pointer">Cancel</button>
                <button data-save style="background:#89b4fa;border:none;color:#1e1e2e;border-radius:4px;padding:4px 12px;cursor:pointer;font-weight:bold">Save</button>
              </div>
            `;
            dialog.appendChild(box);
            document.body.appendChild(dialog);

            dialog.querySelector('[data-cancel]').addEventListener('click', () => dialog.remove());
            dialog.addEventListener('click', (e) => { if (e.target === dialog) dialog.remove(); });

            dialog.querySelector('[data-save]').addEventListener('click', async () => {
              try {
                const actions = JSON.parse(box.querySelector('[data-actions-json]').value);
                const newFavs = favorites.map(f => f.name === name ? { ...f, actions } : f);
                await fetch('/api/vms/favorites', {
                  method: 'PUT',
                  headers: {'Content-Type': 'application/json'},
                  body: JSON.stringify(newFavs),
                });
                dialog.remove();
                card.render();
              } catch (err) {
                alert('Invalid JSON: ' + err.message);
              }
            });
          });
        });

        card.updateState(favorites.length > 0 ? 'working' : 'idle');
      } catch (err) {
        body.innerHTML = `<div class="widget-row"><span class="widget-label" style="color:#f38ba8">Error: ${err.message}</span></div>`;
        card.updateState('dead');
      }
    },
  },
};

// ════════════════════════════════════════════
// WidgetCard subclass
// ════════════════════════════════════════════
class WidgetCard extends Card {
  constructor(opts) {
    super({ ...opts, type: 'widget', hub: opts.hub || opts.widgetType, container: '', symbol: opts.symbol || 'W' });
    this.widgetType = opts.widgetType;
    this.refreshInterval = opts.refreshInterval || (WIDGET_REGISTRY[opts.widgetType]?.defaultRefreshInterval) || 30000;
    this._refreshTimer = null;
  }

  createBody() {
    const body = document.createElement('div');
    body.className = 'terminal-body widget-body';
    return body;
  }

  onInit() {
    this.render();
    this._refreshTimer = setInterval(() => this.render(), this.refreshInterval);
  }

  onDestroy() {
    if (this._refreshTimer) clearInterval(this._refreshTimer);
  }

  async render() {
    const body = this.el.querySelector(`[data-body="${this.id}"]`);
    if (!body) return;
    const widgetDef = WIDGET_REGISTRY[this.widgetType];
    if (widgetDef && widgetDef.render) {
      await widgetDef.render(body, this);
    } else {
      body.innerHTML = `<div class="widget-row"><span class="widget-label" style="color:#f38ba8">Unknown widget: ${this.widgetType}</span></div>`;
    }
  }

  serialize() {
    const data = super.serialize();
    data.widgetType = this.widgetType;
    data.refreshInterval = this.refreshInterval;
    return data;
  }

  static fromSerialized(data) {
    const card = new WidgetCard({
      widgetType: data.widgetType,
      x: data.x || 0,
      y: data.y || 0,
      w: data.w || 360,
      h: data.h || 280,
      symbol: 'W',
      refreshInterval: data.refreshInterval,
    });
    return card;
  }
}

CARD_TYPE_REGISTRY.register('widget', {
  cardClass: WidgetCard,
  label: 'Widget',
  symbol: 'W',
  defaultSize: { w: 360, h: 280 },
  menuSection: 'widgets',
});


// ════════════════════════════════════════════
// BlueprintCard — live execution log card
// ════════════════════════════════════════════
class BlueprintCard extends Card {
  constructor(opts = {}) {
    const blueprintName = opts.blueprintName || opts.blueprint_name || 'Blueprint';
    super({
      ...opts,
      type: 'blueprint',
      symbol: 'B',
      hub: `Blueprint: ${blueprintName}`,
      w: opts.w || 500,
      h: opts.h || 340,
    });
    this.runId = opts.runId || opts.run_id || '';
    this.blueprintName = blueprintName;
    this.cardId = opts.cardId || opts.card_id || '';
    this._logLines = [];
    this._status = 'running'; // running | completed | failed
  }

  createElement() {
    super.createElement();
    // Create log container in body
    const body = this.el.querySelector('.card-body');
    if (body) {
      body.style.overflow = 'auto';
      body.style.fontFamily = 'monospace';
      body.style.fontSize = '11px';
      body.style.padding = '8px';
      body.style.lineHeight = '1.4';
      body.style.whiteSpace = 'pre-wrap';
      body.style.color = '#cdd6f4';
      body.innerHTML = '<div class="blueprint-log"></div>';
    }
  }

  appendLog(message, ts) {
    this._logLines.push({ message, ts });
    const body = this.el ? this.el.querySelector('.blueprint-log') : null;
    if (body) {
      const line = document.createElement('div');
      line.textContent = `[${ts ? new Date(ts).toLocaleTimeString() : '??:??:??'}] ${message}`;
      body.appendChild(line);
      // Auto-scroll to bottom
      const parent = body.parentElement;
      if (parent) parent.scrollTop = parent.scrollHeight;
    }
  }

  setStatus(status) {
    this._status = status;
    const titleEl = this.el ? this.el.querySelector('.hub-name') : null;
    if (titleEl) {
      const icon = status === 'completed' ? ' ✓' : status === 'failed' ? ' ✗' : '';
      titleEl.textContent = `Blueprint: ${this.blueprintName}${icon}`;
    }
    // Color the header
    const header = this.el ? this.el.querySelector('.card-header') : null;
    if (header) {
      if (status === 'completed') header.style.borderBottom = '2px solid #a6e3a1';
      else if (status === 'failed') header.style.borderBottom = '2px solid #f38ba8';
    }
  }

  serialize() {
    // Blueprints are ephemeral — don't persist in canvas layouts
    return null;
  }

  static fromSerialized(data) {
    // Blueprints are ephemeral — they are not restored from layouts
    return null;
  }
}

CARD_TYPE_REGISTRY.register('blueprint', {
  cardClass: BlueprintCard,
  label: 'Blueprint',
  symbol: 'B',
  defaultSize: { w: 500, h: 340 },
  menuSection: null, // Not in context menu — spawned via API
});


// ════════════════════════════════════════════
// Terminal state management
// ════════════════════════════════════════════
function updateCardState(id, state) {
  const card = cards.find(c => c.id === id);
  if (!card) return;
  card.updateState(state);
}

// Periodic check: transition "working" → "idle" after IDLE_THRESHOLD_MS of no output
setInterval(() => {
  const now = Date.now();
  for (const c of cards) {
    if (c.state === 'working' && (now - c.lastOutput) > IDLE_THRESHOLD_MS) {
      c.updateState('idle');
    }
  }
}, 1000);

// Card creation now flows exclusively through `CARD_TYPE_REGISTRY.spawn(type, opts)`.
// Type-specific prep (hub symbol lookup for terminals, canvas-claude session
// staleness probe + priority-profile resolution) lives in per-type
// `prepareOpts` hooks registered next to each card class definition.

function destroyCard(id) {
  const idx = cards.findIndex(c => c.id === id);
  if (idx === -1) return;
  const card = cards[idx];
  card.destroy();
  cards.splice(idx, 1);
  saveLayout();
  drawMinimap();
  updateHubCount();
}

function focusCard(id) {
  focusedCardId = id;
  cards.forEach(c => {
    if (c.id === id) { c.onFocus(); } else { c.onBlur(); }
  });
}

function updateHubCount() {
  const termCount = cards.filter(c => c.type === 'terminal').length;
  const widgetCount = cards.filter(c => c.type === 'widget').length;
  const parts = [`${hubs.length} hub(s)`, `${termCount} terminal(s)`];
  if (widgetCount > 0) parts.push(`${widgetCount} widget(s)`);
  document.getElementById('hub-count').textContent = parts.join(' | ');
}

// Dispatch a saved layout entry through CARD_TYPE_REGISTRY.spawn so the full
// type-specific prep (symbol lookup, canvas-claude session probe, profile
// resolution) runs uniformly. Used by switchCanvas and the boot loader.
// Terminals resolve their hub from `hubs[]` when possible; if the hub is not
// currently discovered the entry is skipped (matching legacy behaviour).
// Entries without a `type` but with a `hub` field are treated as terminals
// (pre-type-field compatibility).
async function spawnFromSerialized(s) {
  let typeName = s.type;
  if (!typeName && s.hub) typeName = 'terminal';
  if (!typeName) {
    console.warn('spawnFromSerialized: entry has no type and no hub, skipping', s);
    return null;
  }
  if (typeName === 'terminal') {
    const hub = hubs.find(h => h.hub === s.hub);
    if (!hub) return null; // undiscovered hub — skip, like the old ladder did
    return CARD_TYPE_REGISTRY.spawn('terminal', {
      hub,
      x: s.x, y: s.y, w: s.w, h: s.h,
      exec: s.exec,
      sessionId: s.session_id,
      controlGroups: s.controlGroups,
    });
  }
  if (typeName === 'widget') {
    if (!s.widgetType) return null;
    return CARD_TYPE_REGISTRY.spawn('widget', {
      widgetType: s.widgetType,
      x: s.x, y: s.y, w: s.w, h: s.h,
      refreshInterval: s.refreshInterval,
    });
  }
  if (typeName === 'canvas_claude') {
    return CARD_TYPE_REGISTRY.spawn('canvas_claude', {
      x: s.x, y: s.y, w: s.w, h: s.h,
      sessionId: s.session_id,
      profile: s.profile,
      canvasName: s.canvasName,
    });
  }
  // Unknown type: fall back to the registry so any future card type that
  // registers itself is handled automatically.
  return CARD_TYPE_REGISTRY.spawn(typeName, { ...s, sessionId: s.session_id });
}

// ════════════════════════════════════════════
// Zoom to card
// ════════════════════════════════════════════
function zoomToCard(card) {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const pad = 40;
  zoom = Math.min((vw - pad * 2) / card.w, (vh - pad * 2) / card.h, 2);
  pan.x = (vw - card.w * zoom) / 2 - card.x * zoom;
  pan.y = (vh - card.h * zoom) / 2 - card.y * zoom;
  applyTransform();
  setTimeout(() => { if (card.fitAddon) card.fitAddon.fit(); }, 100);
}

// ════════════════════════════════════════════
// Control groups
// ════════════════════════════════════════════
function updateControlGroupBadges(card) {
  const container = card.el.querySelector(`[data-cg-badges="${card.id}"]`);
  if (!container) return;
  container.innerHTML = '';
  for (const num of card.controlGroupNums.sort((a, b) => a - b)) {
    const badge = document.createElement('span');
    badge.className = 'control-group-badge';
    badge.textContent = num;
    container.appendChild(badge);
  }
}

function flashControlGroupBadges(card) {
  const container = card.el.querySelector(`[data-cg-badges="${card.id}"]`);
  if (!container) return;
  container.querySelectorAll('.control-group-badge').forEach(badge => {
    badge.classList.remove('flash');
    // Force reflow to restart animation
    void badge.offsetWidth;
    badge.classList.add('flash');
  });
}

function assignControlGroup(groupNum) {
  const selected = cards.filter(c => c.el.classList.contains('focused'));
  if (selected.length === 0) return;

  // Remove previous members of this group
  const prevIds = controlGroups[groupNum] || [];
  for (const id of prevIds) {
    const card = cards.find(c => c.id === id);
    if (card) {
      card.controlGroupNums = card.controlGroupNums.filter(n => n !== groupNum);
      updateControlGroupBadges(card);
    }
  }

  // Assign selected cards to this group
  const newIds = selected.map(c => c.id);
  controlGroups[groupNum] = newIds;
  for (const card of selected) {
    if (!card.controlGroupNums.includes(groupNum)) {
      card.controlGroupNums.push(groupNum);
    }
    updateControlGroupBadges(card);
    flashControlGroupBadges(card);
  }
  saveLayout();
}

function recallControlGroup(groupNum, doubleTap) {
  const ids = controlGroups[groupNum];
  if (!ids || ids.length === 0) return;

  const groupCards = ids.map(id => cards.find(c => c.id === id)).filter(Boolean);
  if (groupCards.length === 0) return;

  // Select those cards, deselect others
  cards.forEach(c => c.onBlur());
  groupCards.forEach(c => c.onFocus());
  if (groupCards.length > 0) focusedCardId = groupCards[groupCards.length - 1].id;

  // Zoom to fit the group
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const c of groupCards) {
    minX = Math.min(minX, c.x);
    minY = Math.min(minY, c.y);
    maxX = Math.max(maxX, c.x + c.w);
    maxY = Math.max(maxY, c.y + c.h);
  }
  const cw = maxX - minX;
  const ch = maxY - minY;
  const pad = doubleTap ? 20 : 60;
  const maxZoom = doubleTap ? 2 : 1.5;
  zoom = Math.min((vw - pad * 2) / cw, (vh - pad * 2) / ch, maxZoom);
  pan.x = (vw - cw * zoom) / 2 - minX * zoom;
  pan.y = (vh - ch * zoom) / 2 - minY * zoom;
  applyTransform();
  setTimeout(() => groupCards.forEach(c => { if (c.fitAddon) c.fitAddon.fit(); }), 100);
}

function rebuildControlGroupsFromCards() {
  // Clear existing
  for (const key of Object.keys(controlGroups)) delete controlGroups[key];
  for (const card of cards) {
    for (const num of card.controlGroupNums) {
      if (!controlGroups[num]) controlGroups[num] = [];
      controlGroups[num].push(card.id);
    }
    updateControlGroupBadges(card);
  }
}

// ════════════════════════════════════════════
// Initial layout: 3x2 grid centered on canvas
// ════════════════════════════════════════════
function layoutGrid(hubList) {
  const cols = 3;
  const totalW = cols * CARD_W + (cols - 1) * CARD_GAP;
  const rows = Math.ceil(hubList.length / cols);
  const totalH = rows * CARD_H + (rows - 1) * CARD_GAP;
  const startX = (CANVAS_W - totalW) / 2;
  const startY = (CANVAS_H - totalH) / 2;

  hubList.forEach((hub, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = startX + col * (CARD_W + CARD_GAP);
    const y = startY + row * (CARD_H + CARD_GAP);
    CARD_TYPE_REGISTRY.spawn('terminal', { hub, x, y });
  });
}

// ════════════════════════════════════════════
// Settings
// ════════════════════════════════════════════
const DEFAULT_SETTINGS = {
  copy: 'ctrl-shift-c',
  paste: 'ctrl-shift-v',
  rightclick: 'paste',
  idle_threshold: 5,
  default_canvas: 'probe-qa',
  theme: 'catppuccin-mocha',
};
let settings = { ...DEFAULT_SETTINGS };

async function loadSettings() {
  try {
    const resp = await fetch('/api/config');
    if (resp.ok) {
      const data = await resp.json();
      // Map server keys to UI: idle_threshold -> idle for backward compat
      settings.copy = data.copy || DEFAULT_SETTINGS.copy;
      settings.paste = data.paste || DEFAULT_SETTINGS.paste;
      settings.rightclick = data.rightclick || DEFAULT_SETTINGS.rightclick;
      settings.idle_threshold = data.idle_threshold ?? DEFAULT_SETTINGS.idle_threshold;
      settings.default_canvas = data.default_canvas || DEFAULT_SETTINGS.default_canvas;
      settings.theme = data.theme || DEFAULT_SETTINGS.theme;
    }
  } catch (err) {
    console.warn('Failed to load settings from server, using defaults:', err);
  }
  applySettingsToUI();
  applySettingsToState();
}

async function saveSettings() {
  try {
    await fetch('/api/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(settings),
    });
  } catch (err) {
    console.warn('Failed to save settings to server:', err);
  }
  applySettingsToState();
}

function applySettingsToUI() {
  document.getElementById('setting-copy').value = settings.copy;
  document.getElementById('setting-paste').value = settings.paste;
  document.getElementById('setting-rightclick').value = settings.rightclick;
  document.getElementById('setting-idle').value = String(settings.idle_threshold);
}

function applySettingsToState() {
  IDLE_THRESHOLD_MS = settings.idle_threshold * 1000;
}

function resetSettings() {
  settings = { ...DEFAULT_SETTINGS };
  saveSettings();
  applySettingsToUI();
}

// Settings panel open/close
const settingsOverlay = document.getElementById('settings-overlay');
document.getElementById('btn-settings').addEventListener('click', () => {
  settingsOverlay.classList.add('visible');
});
document.getElementById('btn-close-settings').addEventListener('click', () => {
  settingsOverlay.classList.remove('visible');
});
document.getElementById('btn-reset-settings').addEventListener('click', resetSettings);
settingsOverlay.addEventListener('click', (e) => {
  if (e.target === settingsOverlay) settingsOverlay.classList.remove('visible');
});

// Live-update settings on change
for (const sel of ['setting-copy', 'setting-paste', 'setting-rightclick', 'setting-idle']) {
  document.getElementById(sel).addEventListener('change', (e) => {
    const key = sel.replace('setting-', '');
    if (key === 'idle') {
      settings.idle_threshold = parseInt(e.target.value);
    } else {
      settings[key] = e.target.value;
    }
    saveSettings();
  });
}

// loadSettings() is called in boot sequence below

// ════════════════════════════════════════════
// Mode switching (RTS / Terminal)
// ════════════════════════════════════════════
const modeIndicator = document.getElementById('mode-indicator');

function setMode(mode, termCard) {
  canvasMode = mode;
  modeIndicator.textContent = mode === 'rts' ? 'RTS' : 'TERMINAL';
  modeIndicator.className = mode;
  if (mode === 'terminal' && termCard) {
    focusedTerminalCard = termCard;
    if (termCard.term) termCard.term.focus();
  } else {
    if (focusedTerminalCard && focusedTerminalCard.term) {
      focusedTerminalCard.term.blur();
    }
    focusedTerminalCard = null;
  }
}

// Click on terminal body -> enter Terminal mode
viewport.addEventListener('pointerdown', (e) => {
  // Only left-click enters terminal mode
  if (e.button !== 0) return;
  const termBody = e.target.closest('.terminal-body');
  if (termBody) {
    const cardId = parseInt(termBody.dataset.body);
    const card = cards.find(c => c.id === cardId);
    if (card && card.term) {
      setMode('terminal', card);
      return;
    }
  }
  // Click on empty canvas -> enter RTS mode
  if (e.target === viewport || e.target === canvas) {
    setMode('rts');
  }
}, true); // capture phase so it fires before xterm's handlers

// ════════════════════════════════════════════
// Keyboard shortcuts
// ════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  // Ctrl+0: fit all (works in both modes)
  if (e.ctrlKey && e.key === '0') {
    e.preventDefault();
    fitAll();
    return;
  }
  // Ctrl+Tab: cycle canvases (works in both modes)
  if (e.ctrlKey && e.key === 'Tab') {
    e.preventDefault();
    if (canvasList.length > 1) {
      const idx = canvasList.indexOf(currentCanvasName);
      const next = e.shiftKey
        ? (idx - 1 + canvasList.length) % canvasList.length
        : (idx + 1) % canvasList.length;
      switchCanvas(canvasList[next]);
    }
    return;
  }
  // Escape: switch to RTS mode and deselect
  if (e.key === 'Escape') {
    setMode('rts');
    focusedCardId = null;
    cards.forEach(c => c.onBlur());
    return;
  }

  // ── RTS-only keybindings ──
  if (canvasMode !== 'rts') return;
  // Ignore if typing in an input/textarea
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  // Ctrl+1-9: assign control group (before the modifier bail-out)
  if (e.ctrlKey && !e.metaKey && !e.altKey && e.key >= '1' && e.key <= '9') {
    e.preventDefault();
    assignControlGroup(parseInt(e.key));
    return;
  }

  // Ignore if modifier keys are held (let browser/OS shortcuts work)
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  // 1-9: recall control group
  if (e.key >= '1' && e.key <= '9') {
    e.preventDefault();
    const groupNum = parseInt(e.key);
    const now = Date.now();
    const doubleTap = (lastRecallKey === e.key && (now - lastRecallTime) < 300);
    lastRecallKey = e.key;
    lastRecallTime = now;
    recallControlGroup(groupNum, doubleTap);
    return;
  }

  if (e.key === 'a' || e.key === 'A') {
    // Select all cards
    e.preventDefault();
    cards.forEach(c => c.onFocus());
    if (cards.length > 0) focusedCardId = cards[cards.length - 1].id;
    return;
  }

  if (e.key === 'f' || e.key === 'F') {
    // Fit all
    e.preventDefault();
    fitAll();
    return;
  }

  if (e.key === ' ') {
    // Center on focused/selected card
    e.preventDefault();
    const focused = cards.find(c => c.id === focusedCardId);
    if (focused) {
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;
      pan.x = (vw / 2) - (focused.x + focused.w / 2) * zoom;
      pan.y = (vh / 2) - (focused.y + focused.h / 2) * zoom;
      applyTransform();
    }
    return;
  }

  if (e.key === 'Delete') {
    // Close selected/focused card(s)
    e.preventDefault();
    const selected = cards.filter(c => c.el.classList.contains('focused'));
    if (selected.length > 0) {
      // Destroy in reverse to avoid index issues
      [...selected].reverse().forEach(c => destroyCard(c.id));
    }
    return;
  }
});

// ════════════════════════════════════════════
// Layout persistence (server-side canvases)
// ════════════════════════════════════════════
let currentCanvasName = 'main';
let canvasList = [];  // list of available canvas names

function saveLayout() {
  const data = {
    name: currentCanvasName,
    canvas_size: [CANVAS_W, CANVAS_H],
    cards: cards.map(c => c.serialize()),
  };
  fetch(`/api/canvases/${encodeURIComponent(currentCanvasName)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  }).catch(err => console.warn('Failed to save layout:', err));
}

async function loadLayout() {
  try {
    const resp = await fetch(`/api/canvases/${encodeURIComponent(currentCanvasName)}`);
    if (!resp.ok) return null;
    const data = await resp.json();
    return data.cards || null;
  } catch {
    return null;
  }
}

// ════════════════════════════════════════════
// Canvas switcher
// ════════════════════════════════════════════
const canvasSwitcherBtn = document.getElementById('canvas-switcher-btn');
const canvasDropdown = document.getElementById('canvas-dropdown');
const canvasSwitcherLabel = document.getElementById('canvas-switcher-label');

function updateCanvasSwitcherLabel() {
  canvasSwitcherLabel.textContent = currentCanvasName;
}

async function refreshCanvasList() {
  try {
    const resp = await fetch('/api/canvases');
    if (resp.ok) canvasList = await resp.json();
  } catch (err) {
    console.warn('Failed to fetch canvas list:', err);
  }
  // Ensure current canvas is in the list
  if (!canvasList.includes(currentCanvasName)) {
    canvasList.push(currentCanvasName);
    canvasList.sort();
  }
}

function renderCanvasDropdown() {
  let html = '';
  for (const name of canvasList) {
    const active = name === currentCanvasName ? ' active' : '';
    const deleteBtn = name === 'main' ? '' :
      `<button class="delete-canvas-btn" data-delete-canvas="${name}" title="Delete canvas">&times;</button>`;
    html += `<div class="canvas-dropdown-item${active}" data-switch-canvas="${name}">
      <span class="canvas-label">${name}</span>${deleteBtn}
    </div>`;
  }
  html += '<div class="canvas-dropdown-sep"></div>';
  html += '<div class="canvas-dropdown-action" id="canvas-new-action">+ New canvas</div>';
  html += '<div class="canvas-dropdown-action" id="canvas-rename-action">Rename current</div>';
  canvasDropdown.innerHTML = html;

  // Switch handlers
  canvasDropdown.querySelectorAll('[data-switch-canvas]').forEach(item => {
    item.addEventListener('click', (e) => {
      if (e.target.closest('.delete-canvas-btn')) return;
      const name = item.dataset.switchCanvas;
      if (name !== currentCanvasName) switchCanvas(name);
      hideCanvasDropdown();
    });
  });

  // Delete handlers
  canvasDropdown.querySelectorAll('.delete-canvas-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const name = btn.dataset.deleteCanvas;
      if (!confirm(`Delete canvas "${name}"?`)) return;
      try {
        const resp = await fetch(`/api/canvases/${encodeURIComponent(name)}`, { method: 'DELETE' });
        if (resp.ok) {
          await refreshCanvasList();
          if (currentCanvasName === name) {
            await switchCanvas('main');
          }
          renderCanvasDropdown();
        }
      } catch (err) {
        console.warn('Failed to delete canvas:', err);
      }
    });
  });

  // New canvas
  const newAction = canvasDropdown.querySelector('#canvas-new-action');
  if (newAction) {
    newAction.addEventListener('click', async () => {
      hideCanvasDropdown();
      const name = prompt('New canvas name (letters, numbers, hyphens, underscores):');
      if (!name || !/^[a-zA-Z0-9_-]+$/.test(name)) {
        if (name !== null) alert('Invalid canvas name. Use only letters, numbers, hyphens, underscores.');
        return;
      }
      // Save current canvas first, then switch to the new empty canvas
      saveLayout();
      // Create an empty canvas on the server
      await fetch(`/api/canvases/${encodeURIComponent(name)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, canvas_size: [CANVAS_W, CANVAS_H], cards: [] }),
      });
      await switchCanvas(name);
    });
  }

  // Rename canvas
  const renameAction = canvasDropdown.querySelector('#canvas-rename-action');
  if (renameAction) {
    renameAction.addEventListener('click', async () => {
      hideCanvasDropdown();
      const newName = prompt('Rename canvas to:', currentCanvasName);
      if (!newName || newName === currentCanvasName || !/^[a-zA-Z0-9_-]+$/.test(newName)) {
        if (newName !== null && newName !== currentCanvasName) alert('Invalid canvas name.');
        return;
      }
      // Save current layout under the new name, delete the old one
      const oldName = currentCanvasName;
      const layoutData = {
        name: newName,
        canvas_size: [CANVAS_W, CANVAS_H],
        cards: cards.map(c => c.serialize()),
      };
      await fetch(`/api/canvases/${encodeURIComponent(newName)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(layoutData),
      });
      if (oldName !== 'main') {
        await fetch(`/api/canvases/${encodeURIComponent(oldName)}`, { method: 'DELETE' });
      }
      currentCanvasName = newName;
      updateCanvasSwitcherLabel();
      await refreshCanvasList();
    });
  }
}

function showCanvasDropdown() {
  renderCanvasDropdown();
  canvasDropdown.classList.add('visible');
}

function hideCanvasDropdown() {
  canvasDropdown.classList.remove('visible');
}

canvasSwitcherBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (canvasDropdown.classList.contains('visible')) {
    hideCanvasDropdown();
  } else {
    showCanvasDropdown();
  }
});

document.addEventListener('click', () => hideCanvasDropdown());
canvasDropdown.addEventListener('click', (e) => e.stopPropagation());

async function switchCanvas(name) {
  // 1. Save current layout
  saveLayout();

  // 2. Destroy all current cards
  while (cards.length > 0) {
    const card = cards.pop();
    card.destroy();
  }
  focusedCardId = null;

  // 3. Update current canvas name
  currentCanvasName = name;
  updateCanvasSwitcherLabel();
  await refreshCanvasList();

  // 4. Load the new canvas layout
  const saved = await loadLayout();
  if (saved && saved.length > 0) {
    for (const s of saved) {
      // Isolate per-entry failures so one bad entry cannot abort the rest.
      try {
        await spawnFromSerialized(s);
      } catch (err) {
        console.warn('switchCanvas: restore entry failed, skipping:', s, err);
      }
    }
    rebuildControlGroupsFromCards();
  }

  // 5. Fit view
  if (cards.length > 0) {
    setTimeout(fitAll, 200);
  }

  drawMinimap();
  updateHubCount();
}

// ════════════════════════════════════════════
// Control WebSocket — server-pushed card events
// ════════════════════════════════════════════

// Short-TTL set of session_ids that were explicitly destroyed locally.
// Prevents a queued card_created broadcast from re-spawning a card that was
// just deleted (e.g. during test teardown or rapid user close).
const _recentlyDestroyedSessions = new Set();
function _markSessionDestroyed(sessionId) {
  if (!sessionId) return;
  _recentlyDestroyedSessions.add(sessionId);
  setTimeout(() => _recentlyDestroyedSessions.delete(sessionId), 5000);
}

let controlWs = null;
let controlWsReconnectTimer = null;

function connectControlWs() {
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${wsProto}//${location.host}/ws/control`;
  controlWs = new WebSocket(url);

  controlWs.addEventListener('open', () => {
    console.log('[control-ws] connected');
  });

  controlWs.addEventListener('message', (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'card_created') {
        handleControlCardCreated(msg);
      } else if (msg.type === 'card_deleted') {
        handleControlCardDeleted(msg);
      } else if (msg.type === 'blueprint:log') {
        handleBlueprintLog(msg);
      } else if (msg.type === 'blueprint:completed') {
        handleBlueprintCompleted(msg);
      } else if (msg.type === 'blueprint:failed') {
        handleBlueprintFailed(msg);
      } else if (msg.type === 'blueprint:open_widget') {
        handleBlueprintOpenWidget(msg);
      }
    } catch (err) {
      console.warn('[control-ws] bad message:', err);
    }
  });

  controlWs.addEventListener('close', () => {
    console.log('[control-ws] disconnected, reconnecting in 3s');
    controlWsReconnectTimer = setTimeout(connectControlWs, 3000);
  });

  controlWs.addEventListener('error', () => {
    // close event will follow — reconnect handled there
  });
}

async function handleControlCardCreated(msg) {
  const desc = msg.descriptor;
  if (!desc) return;

  // canvas_claude cards always self-create via _createAndConnect() — never spawn from
  // the control event, which would race with the in-flight fetch and create duplicate cards.
  if (desc.type === 'canvas_claude') return;

  // Blueprint cards are spawned directly from context menu — skip the control event
  // to avoid duplicates. Also skip container_starter (hidden cards).
  if (desc.type === 'blueprint' || desc.type === 'container_starter') return;

  // Avoid duplicates — check if a card with this session_id already exists or was
  // recently destroyed locally (guards against queued broadcasts racing with teardown).
  if (desc.session_id && (
    cards.some(c => c.sessionId === desc.session_id) ||
    _recentlyDestroyedSessions.has(desc.session_id)
  )) return;

  if (desc.type === 'terminal') {
    const hubName = desc.hub || desc.exec || 'api-terminal';
    const container = desc.container || '';

    // Belt-and-suspenders guard: if a locally-spawned terminal with the same
    // hub+container is already in cards[] but hasn't received its sessionId yet
    // (card_created broadcast beat the terminal's own WS message), skip — the
    // card exists and will assign sessionId itself.
    if (cards.some(c =>
      c.type === 'terminal' &&
      c.hub === hubName &&
      (c.container || '') === container &&
      c.sessionId == null
    )) return;

    // Place near center of current viewport if no layout hints
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const cx = (-pan.x + vw / 2) / zoom;
    const cy = (-pan.y + vh / 2) / zoom;
    const x = desc.x != null ? desc.x : cx - CARD_W / 2 + Math.random() * 60;
    const y = desc.y != null ? desc.y : cy - CARD_H / 2 + Math.random() * 60;

    // Ensure hub is in the hubs array so it shows in sidebar / can be found on reload
    if (!hubs.find(entry => entry.hub === hubName)) {
      hubs.push({ hub: hubName, container: container, exec: desc.exec || null });
      hubSymbolMap[hubName] = HUB_SYMBOLS[hubs.length % HUB_SYMBOLS.length];
    }

    await CARD_TYPE_REGISTRY.spawn('terminal', {
      hub: hubName,
      container: container,
      exec: desc.exec || null,
      sessionId: desc.session_id,
      x, y,
      w: desc.w || CARD_W,
      h: desc.h || CARD_H,
    });
    saveLayout();
  }
}

function handleControlCardDeleted(msg) {
  const cardId = msg.card_id;
  if (!cardId) return;

  // Find the card by session_id (TerminalCard) or cardId (BlueprintCard)
  let idx = cards.findIndex(c => c.sessionId === cardId);
  if (idx === -1) idx = cards.findIndex(c => c.cardId === cardId);
  if (idx === -1) return;

  const card = cards[idx];
  card.destroy();
  cards.splice(idx, 1);
  saveLayout();
  drawMinimap();
  updateHubCount();
}

// ════════════════════════════════════════════
// Blueprint event handlers
// ════════════════════════════════════════════
function _findBlueprintCard(runId) {
  return cards.find(c => c.type === 'blueprint' && c.runId === runId);
}

function handleBlueprintLog(msg) {
  const card = _findBlueprintCard(msg.run_id);
  if (card) card.appendLog(msg.message, msg.ts);
}

function handleBlueprintCompleted(msg) {
  const card = _findBlueprintCard(msg.run_id);
  if (card) {
    card.appendLog('Blueprint completed successfully', new Date().toISOString());
    card.setStatus('completed');
  }
}

function handleBlueprintFailed(msg) {
  const card = _findBlueprintCard(msg.run_id);
  if (card) {
    card.appendLog(`Blueprint FAILED: ${msg.error || 'unknown error'}`, new Date().toISOString());
    card.setStatus('failed');
  }
}

async function handleBlueprintOpenWidget(msg) {
  // Frontend coordination for open_widget step
  const widgetType = msg.widget_type;
  const layout = msg.layout || {};
  const runId = msg.run_id;

  try {
    const card = await CARD_TYPE_REGISTRY.spawn('widget', {
      widgetType,
      x: layout.x || 100,
      y: layout.y || 100,
      w: layout.w,
      h: layout.h,
    });
    // Send ack back via the control WebSocket
    if (controlWs && controlWs.readyState === WebSocket.OPEN) {
      controlWs.send(JSON.stringify({
        type: 'blueprint:widget_ack',
        run_id: runId,
        card_id: card ? card.id : null,
      }));
    }
  } catch (err) {
    console.error('[blueprint] open_widget failed:', err);
  }
}

// ════════════════════════════════════════════
// Boot
// ════════════════════════════════════════════
(async function() {
  // Load settings first (determines default_canvas)
  await loadSettings();
  currentCanvasName = settings.default_canvas || 'probe-qa';
  updateCanvasSwitcherLabel();

  // Load canvas list
  await refreshCanvasList();

  // Show a LoaderCard during startup
  const loaderX = (CANVAS_W - 360) / 2;
  const loaderY = (CANVAS_H - 140) / 2;
  const scriptName = settings.startup_script || 'discover-devcontainers';
  const loader = new LoaderCard({ scriptName, x: loaderX, y: loaderY });
  loader.createElement();
  canvas.appendChild(loader.el);

  // Center on loader
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  pan.x = (vw - 360) / 2 - loaderX;
  pan.y = (vh - 140) / 2 - loaderY;
  applyTransform();

  let startupCards = [];
  let startupError = false;

  try {
    const resp = await fetch('/api/startup');
    const data = await resp.json();
    if (data.status === 'error') {
      loader.setError(`Startup failed: ${data.error}`);
      startupError = true;
      // Wait a moment so user sees the error, then fall back to /api/hubs
      await new Promise(r => setTimeout(r, 2000));
    } else {
      startupCards = data.cards || [];
    }
  } catch (err) {
    loader.setError(`Startup failed: ${err.message}`);
    startupError = true;
    await new Promise(r => setTimeout(r, 2000));
  }

  // If startup returned cards, convert them to hub format
  if (startupCards.length > 0) {
    hubs = startupCards.map(c => ({
      hub: c.name,
      container: c.container || '',
      exec: c.exec || null,
    }));
  } else if (startupError || startupCards.length === 0) {
    // Fallback: try legacy /api/hubs discovery
    loader.setStatus('Falling back to hub discovery...');
    try {
      const resp = await fetch('/api/hubs');
      const hubData = await resp.json();
      hubs = hubData.map(h => ({
        ...h,
        exec: `docker.exe exec -it -u vscode -w /workspaces/${h.hub} ${h.container} bash -l`,
      }));
    } catch {
      hubs = [];
    }
  }

  // Fetch probe profiles from config
  try {
    const cfgResp = await fetch('/api/config');
    const cfg = await cfgResp.json();
    probeProfiles = cfg.probe_profiles || [];
  } catch { probeProfiles = []; }

  // Remove loader card
  loader.destroy();

  // Connect control WebSocket for server-pushed card events
  connectControlWs();

  // Pre-fetch blueprints for context menu
  _refreshBlueprintCache();

  if (hubs.length === 0) {
    document.getElementById('hub-count').textContent = 'No containers running';
    return;
  }

  // Assign symbols to hubs
  hubs.forEach((h, i) => {
    hubSymbolMap[h.hub] = HUB_SYMBOLS[i % HUB_SYMBOLS.length];
  });

  // Restore saved layout or use default grid
  const saved = await loadLayout();
  if (saved && saved.length > 0) {
    // Spawn cards from saved layout
    for (const s of saved) {
      await spawnFromSerialized(s);
    }
    // Spawn any new hubs not in saved layout. Treat layout entries as
    // "terminal for hub" when type is absent (pre-type-field compat).
    for (const hub of hubs) {
      const alreadySaved = saved.some(s => {
        const asTerminal = (s.type === 'terminal') || (!s.type && s.hub);
        return asTerminal && s.hub === hub.hub;
      });
      if (!alreadySaved) {
        await CARD_TYPE_REGISTRY.spawn('terminal', {
          hub,
          x: 100 + Math.random() * 200,
          y: 100 + Math.random() * 200,
        });
      }
    }
    rebuildControlGroupsFromCards();
  } else {
    layoutGrid(hubs);
  }

  // Center viewport on the cards
  setTimeout(fitAll, 200);
})();
</script>
