<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>supreme-claudemander</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #11111b;
    color: #cdd6f4;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ── Status bar ── */
  #status-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 32px;
    background: #181825;
    border-bottom: 1px solid #313244;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 13px;
    z-index: 1000;
    gap: 16px;
  }
  #status-bar .title { font-weight: 600; color: #cba6f7; }
  #status-bar .info { color: #a6adc8; }
  #status-bar .btn {
    background: #313244; border: 1px solid #45475a; color: #cdd6f4;
    padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  #status-bar .btn:hover { background: #45475a; }

  /* ── Viewport (clips the canvas) ── */
  #viewport {
    position: fixed;
    top: 32px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }
  #viewport.panning { cursor: grabbing; }

  /* ── Canvas (4K, pannable/zoomable) ── */
  #canvas {
    position: absolute;
    width: 3840px;
    height: 2160px;
    transform-origin: 0 0;
    background-color: #141422;
    background-image:
      linear-gradient(rgba(69, 71, 90, 0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(69, 71, 90, 0.3) 1px, transparent 1px),
      linear-gradient(rgba(69, 71, 90, 0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(69, 71, 90, 0.12) 1px, transparent 1px);
    background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
  }

  /* ── Terminal card ── */
  .terminal-card {
    position: absolute;
    display: flex;
    flex-direction: column;
    border: 1px solid #45475a;
    border-radius: 8px;
    overflow: hidden;
    background: #1e1e2e;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    min-width: 300px;
    min-height: 200px;
  }
  .terminal-card.focused { border-color: #cba6f7; box-shadow: 0 4px 24px rgba(203,166,247,0.15); }

  .terminal-titlebar {
    height: 32px;
    background: #313244;
    display: flex;
    align-items: center;
    padding: 0 8px 0 12px;
    font-size: 13px;
    font-weight: 500;
    gap: 8px;
    flex-shrink: 0;
    cursor: move;
    user-select: none;
  }
  .terminal-titlebar .hub-symbol {
    font-size: 13px; font-weight: 700; flex-shrink: 0;
    width: 20px; text-align: center; font-family: monospace;
  }
  .terminal-titlebar .hub-name { color: #cdd6f4; }
  .terminal-titlebar .container-name { color: #585b70; font-size: 11px; }
  .terminal-titlebar .spacer { flex: 1; }
  .terminal-titlebar .close-btn {
    width: 20px; height: 20px; border: none; background: transparent;
    color: #585b70; font-size: 16px; cursor: pointer; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .terminal-titlebar .close-btn:hover { background: #f38ba8; color: #1e1e2e; }
  .terminal-titlebar .claude-btn {
    width: 20px; height: 20px; border: none; background: transparent;
    color: #cba6f7; font-size: 12px; cursor: pointer; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    margin-right: 4px;
  }
  .terminal-titlebar .claude-btn:hover { background: #cba6f7; color: #1e1e2e; }
  .terminal-titlebar .claude-btn:disabled { opacity: 0.3; pointer-events: none; }
  .terminal-titlebar .clear-session-btn {
    padding: 2px 8px; font-size: 11px; border-radius: 3px; border: none;
    cursor: pointer; background: #45475a; color: #cdd6f4; margin-right: 4px;
    transition: background 0.15s;
  }
  .terminal-titlebar .clear-session-btn:hover { background: #89b4fa; color: #1e1e2e; }
  .terminal-titlebar .clear-session-btn:disabled { opacity: 0.3; pointer-events: none; }

  .terminal-body {
    flex: 1;
    padding: 4px;
    min-height: 0;
  }
  .terminal-body .xterm { height: 100%; }

  /* Resize handle */
  .resize-handle {
    position: absolute;
    bottom: 0; right: 0;
    width: 16px; height: 16px;
    cursor: nwse-resize;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    bottom: 3px; right: 3px;
    width: 8px; height: 8px;
    border-right: 2px solid #585b70;
    border-bottom: 2px solid #585b70;
  }

  /* ── Minimap ── */
  #minimap {
    position: fixed;
    top: 44px; left: 12px;
    width: 200px; height: 112px;
    background: #181825;
    border: 1px solid #313244;
    border-radius: 6px;
    z-index: 999;
    overflow: hidden;
    cursor: pointer;
  }
  #minimap-canvas {
    width: 100%; height: 100%;
  }

  /* ── Mode indicator ── */
  #mode-indicator {
    position: fixed;
    bottom: 12px;
    right: 12px;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    font-family: monospace;
    z-index: 1000;
    pointer-events: none;
    letter-spacing: 1px;
  }
  #mode-indicator.rts { background: rgba(203,166,247,0.15); color: #cba6f7; }
  #mode-indicator.terminal { background: rgba(166,227,161,0.15); color: #a6e3a1; }

  /* ── Context menu ── */
  #context-menu {
    display: none;
    position: fixed;
    background: #1e1e2e;
    border: 1px solid #45475a;
    border-radius: 6px;
    padding: 4px 0;
    z-index: 2000;
    min-width: 200px;
    max-height: calc(100vh - 20px);
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #context-menu.visible { display: block; }
  .ctx-header {
    padding: 6px 12px;
    font-size: 11px;
    color: #585b70;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ctx-item {
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctx-item:hover { background: #313244; }
  .ctx-item .symbol-preview {
    font-weight: 700; font-family: monospace; font-size: 13px;
    width: 16px; text-align: center; color: #cdd6f4;
  }

  /* ── Settings panel ── */
  #settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 3000;
  }
  #settings-overlay.visible { display: flex; align-items: center; justify-content: center; }

  #settings-panel {
    background: #1e1e2e;
    border: 1px solid #45475a;
    border-radius: 10px;
    width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }
  #settings-panel h2 {
    font-size: 16px; font-weight: 600; color: #cba6f7;
    padding: 16px 20px 12px; margin: 0;
    border-bottom: 1px solid #313244;
  }
  .settings-section {
    padding: 16px 20px;
    border-bottom: 1px solid #313244;
  }
  .settings-section:last-child { border-bottom: none; }
  .settings-section h3 {
    font-size: 13px; font-weight: 600; color: #a6adc8;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; font-size: 13px;
  }
  .setting-row label { color: #cdd6f4; }
  .setting-row select {
    background: #313244; color: #cdd6f4; border: 1px solid #45475a;
    border-radius: 4px; padding: 4px 8px; font-size: 12px;
  }
  .setting-row select:focus { outline: 1px solid #cba6f7; }
  .settings-footer {
    padding: 12px 20px;
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .settings-footer button {
    padding: 6px 16px; border-radius: 4px; font-size: 12px; cursor: pointer;
    border: 1px solid #45475a;
  }
  .settings-footer .btn-close { background: #313244; color: #cdd6f4; }
  .settings-footer .btn-close:hover { background: #45475a; }
  .settings-footer .btn-reset { background: transparent; color: #f38ba8; border-color: #f38ba8; }
  .settings-footer .btn-reset:hover { background: #f38ba822; }

  /* ── Canvas switcher ── */
  #canvas-switcher {
    position: relative;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #canvas-switcher-btn {
    background: #313244; border: 1px solid #45475a; color: #cdd6f4;
    padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  #canvas-switcher-btn:hover { background: #45475a; }
  #canvas-switcher-btn .canvas-icon { color: #cba6f7; }
  #canvas-switcher-btn .arrow { font-size: 10px; color: #a6adc8; }

  #canvas-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 4px;
    background: #1e1e2e;
    border: 1px solid #45475a;
    border-radius: 6px;
    padding: 4px 0;
    z-index: 2000;
    min-width: 200px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #canvas-dropdown.visible { display: block; }
  .canvas-dropdown-item {
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .canvas-dropdown-item:hover { background: #313244; }
  .canvas-dropdown-item.active { color: #cba6f7; }
  .canvas-dropdown-item .canvas-label { flex: 1; }
  .canvas-dropdown-item .delete-canvas-btn {
    background: none; border: none; color: #585b70; cursor: pointer;
    font-size: 14px; padding: 0 2px; border-radius: 3px;
    visibility: hidden;
  }
  .canvas-dropdown-item:hover .delete-canvas-btn { visibility: visible; }
  .canvas-dropdown-item .delete-canvas-btn:hover { color: #f38ba8; }
  .canvas-dropdown-sep {
    height: 1px;
    background: #313244;
    margin: 4px 0;
  }
  .canvas-dropdown-action {
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    color: #a6adc8;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .canvas-dropdown-action:hover { background: #313244; color: #cdd6f4; }

  /* ── Loader card ── */
  .loader-card {
    position: absolute;
    display: flex;
    flex-direction: column;
    border: 1px solid #45475a;
    border-radius: 8px;
    overflow: hidden;
    background: #1e1e2e;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    min-width: 300px;
    min-height: 120px;
  }
  .loader-card .loader-titlebar {
    height: 32px;
    background: #313244;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 13px;
    font-weight: 500;
    color: #cba6f7;
    user-select: none;
  }
  .loader-card .loader-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 12px;
  }
  .loader-card .loader-spinner {
    width: 24px; height: 24px;
    border: 3px solid #313244;
    border-top-color: #cba6f7;
    border-radius: 50%;
    animation: loaderSpin 0.8s linear infinite;
  }
  @keyframes loaderSpin {
    to { transform: rotate(360deg); }
  }
  .loader-card .loader-status {
    font-size: 12px;
    color: #a6adc8;
  }
  .loader-card.error { border-color: #f38ba8; }
  .loader-card.error .loader-titlebar { color: #f38ba8; }
  .loader-card.error .loader-spinner {
    border-top-color: #f38ba8;
    animation: none;
  }

  /* ── Widget body ── */
  .widget-body {
    padding: 12px;
    font-size: 13px;
    color: #cdd6f4;
    overflow-y: auto;
  }
  .widget-body .widget-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid #313244;
  }
  .widget-body .widget-row:last-child { border-bottom: none; }
  .widget-body .widget-label { color: #a6adc8; }
  .widget-body .widget-value { color: #cdd6f4; font-family: monospace; }

  /* ── Usage bar ── */
  .usage-bar-container {
    width: 100%; height: 8px; background: #313244; border-radius: 4px; overflow: hidden;
    margin-top: 4px;
  }
  .usage-bar {
    height: 100%; border-radius: 4px; transition: width 0.3s ease;
  }
  .usage-profile {
    padding: 8px 0;
    border-bottom: 1px solid #313244;
  }
  .usage-profile:last-child { border-bottom: none; }
  .usage-profile-name {
    font-weight: 600; color: #cdd6f4; font-size: 13px; margin-bottom: 6px;
  }
  .usage-metric {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; margin-bottom: 2px;
  }
  .usage-metric-label { color: #a6adc8; }
  .usage-metric-value { color: #cdd6f4; font-family: monospace; }
  .usage-reset { color: #585b70; font-size: 11px; }
  .usage-refresh-btn {
    background: #313244; border: 1px solid #45475a; color: #a6adc8;
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
    margin-top: 8px;
  }
  .usage-refresh-btn:hover { background: #45475a; color: #cdd6f4; }
  .usage-status { color: #585b70; font-size: 11px; text-align: center; padding: 8px 0; }


  /* ── Control group badge ── */
  .control-group-badge {
    font-size: 10px;
    font-family: monospace;
    background: rgba(203, 166, 247, 0.3);
    color: #cba6f7;
    padding: 0 4px;
    border-radius: 3px;
    margin-left: 2px;
  }
  .control-group-badge.flash {
    animation: cgFlash 0.4s ease-out;
  }
  @keyframes cgFlash {
    0% { background: rgba(203, 166, 247, 0.8); color: #1e1e2e; }
    100% { background: rgba(203, 166, 247, 0.3); color: #cba6f7; }
  }
</style>
</head>
<body>

<div id="status-bar">
  <span class="title">supreme-claudemander</span>
  <span class="info" id="hub-count">connecting...</span>
  <div id="canvas-switcher">
    <button id="canvas-switcher-btn">
      <span class="canvas-icon">&#9638;</span>
      <span id="canvas-switcher-label">main</span>
      <span class="arrow">&#9660;</span>
    </button>
    <div id="canvas-dropdown"></div>
  </div>
  <span class="info" id="zoom-level"></span>
  <div style="flex:1"></div>
  <button class="btn" id="btn-fit">Fit all</button>
  <button class="btn" id="btn-settings" title="Settings">&#9881;</button>
</div>

<div id="settings-overlay">
  <div id="settings-panel">
    <h2>Settings</h2>
    <div class="settings-section">
      <h3>Copy</h3>
      <div class="setting-row">
        <label>Copy shortcut</label>
        <select id="setting-copy">
          <option value="ctrl-shift-c">Ctrl+Shift+C</option>
          <option value="ctrl-c-sel">Ctrl+C (when text selected)</option>
          <option value="auto-select">Auto-copy on select</option>
        </select>
      </div>
    </div>
    <div class="settings-section">
      <h3>Paste</h3>
      <div class="setting-row">
        <label>Paste shortcut</label>
        <select id="setting-paste">
          <option value="ctrl-shift-v">Ctrl+Shift+V</option>
          <option value="ctrl-v">Ctrl+V</option>
          <option value="both">Both Ctrl+V and Ctrl+Shift+V</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Right-click on terminal</label>
        <select id="setting-rightclick">
          <option value="paste">Paste from clipboard</option>
          <option value="none">Do nothing</option>
        </select>
      </div>
    </div>
    <div class="settings-section">
      <h3>Terminal</h3>
      <div class="setting-row">
        <label>Scroll wheel behavior</label>
        <select id="setting-scrollMode" disabled>
          <option value="auto">Scroll terminal, Ctrl to zoom</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Idle threshold (seconds)</label>
        <select id="setting-idle">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="10">10</option>
          <option value="30">30</option>
        </select>
      </div>
    </div>
    <div class="settings-footer">
      <button class="btn-reset" id="btn-reset-settings">Reset defaults</button>
      <button class="btn-close" id="btn-close-settings">Close</button>
    </div>
  </div>
</div>

<div id="viewport">
  <div id="canvas"></div>
</div>

<div id="minimap">
  <canvas id="minimap-canvas" width="200" height="112"></canvas>
</div>

<div id="context-menu"></div>

<div id="mode-indicator" class="rts">RTS</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
// ════════════════════════════════════════════
// Global: suppress browser default context menu everywhere
// ════════════════════════════════════════════
document.addEventListener('contextmenu', e => e.preventDefault());

// ════════════════════════════════════════════
// Constants
// ════════════════════════════════════════════
const CANVAS_W = 3840;
const CANVAS_H = 2160;
const CARD_W = 720;
const CARD_H = 480;
const CARD_GAP = 40;

// Snapping
const SNAP_GRID = 20;  // matches the background minor grid
const SNAP_EDGE = 14;  // px threshold for card-edge snapping (canvas coords)

function snapGrid(v) { return Math.round(v / SNAP_GRID) * SNAP_GRID; }

function snapAxis(pos, size, lo, hi) {
  if (Math.abs(pos - hi) < SNAP_EDGE)          return hi;
  if (Math.abs(pos + size - lo) < SNAP_EDGE)   return lo - size;
  if (Math.abs(pos - lo) < SNAP_EDGE)          return lo;
  if (Math.abs(pos + size - hi) < SNAP_EDGE)   return hi - size;
  return pos;
}

function snapEdges(x, y, w, h, excludeId) {
  let sx = x, sy = y;
  for (const card of cards.values()) {
    if (card.id === excludeId) continue;
    sx = snapAxis(x, w, card.x, card.x + card.w);
    sy = snapAxis(y, h, card.y, card.y + card.h);
  }
  return [sx, sy];
}

function snapPos(x, y, w, h, excludeId) {
  const [ex, ey] = snapEdges(x, y, w, h, excludeId);
  return [snapGrid(ex), snapGrid(ey)];
}

// Hub symbols: each hub gets a unique letter
const HUB_SYMBOLS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

// State colors
const STATE_COLORS = {
  working: '#a6e3a1',      // green — stdout activity in last N seconds
  idle: '#f9e2af',         // yellow — no recent output, process alive
  dead: '#f38ba8',         // red — disconnected or process exited
  connecting: '#585b70',   // gray — initial connection
};
let IDLE_THRESHOLD_MS = 5000; // updated by settings

// ════════════════════════════════════════════
// State
// ════════════════════════════════════════════
let cards = [];         // Card instances
let hubs = [];          // from /api/hubs
let hubSymbolMap = {};
let probeProfiles = []; // from /api/config probe_profiles  // hub name -> symbol
let pan = { x: 0, y: 0 };
let zoom = 1;
let isPanning = false;
let panStart = { x: 0, y: 0, panX: 0, panY: 0 };
let rightClickStart = null; // {x, y} — tracks right-click origin for drag threshold
let focusedCardId = null;
let canvasMode = 'rts'; // 'rts' or 'terminal'
let focusedTerminalCard = null; // reference to the TerminalCard in terminal mode

// Control groups (1-9): maps group number to array of card IDs
const controlGroups = {};
let lastRecallKey = null;
let lastRecallTime = 0;

const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');
const ctxMenu = document.getElementById('context-menu');

// ════════════════════════════════════════════
// Canvas transform
// ════════════════════════════════════════════
function applyTransform() {
  canvas.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
  document.getElementById('zoom-level').textContent = `${Math.round(zoom * 100)}%`;
  drawMinimap();
}

// ════════════════════════════════════════════
// Pan (drag empty canvas)
// ════════════════════════════════════════════
viewport.addEventListener('dblclick', (e) => {
  if (e.target !== viewport && e.target !== canvas) return;
  fitAll();
});

viewport.addEventListener('pointerdown', (e) => {
  // Right-click can pan from anywhere (including over terminal cards)
  if (e.button === 2) {
    rightClickStart = { x: e.clientX, y: e.clientY };
    isPanning = true;
    viewport.classList.add('panning');
    panStart = { x: e.clientX, y: e.clientY, panX: pan.x, panY: pan.y };
    viewport.setPointerCapture(e.pointerId);
    return;
  }
  // Left-click pan only on empty canvas
  if (e.target !== viewport && e.target !== canvas) return;
  isPanning = true;
  viewport.classList.add('panning');
  panStart = { x: e.clientX, y: e.clientY, panX: pan.x, panY: pan.y };
  viewport.setPointerCapture(e.pointerId);
});
viewport.addEventListener('pointermove', (e) => {
  if (!isPanning) return;
  pan.x = panStart.panX + (e.clientX - panStart.x);
  pan.y = panStart.panY + (e.clientY - panStart.y);
  applyTransform();
});
viewport.addEventListener('pointerup', () => {
  isPanning = false;
  viewport.classList.remove('panning');
});

// ════════════════════════════════════════════
// Zoom (wheel, cursor-centered)
// ════════════════════════════════════════════
viewport.addEventListener('wheel', (e) => {
  // Scroll over terminal = scroll terminal; Ctrl+scroll = zoom canvas
  const overTerminal = e.target.closest('.terminal-card');
  if (overTerminal && !e.ctrlKey) {
    return; // let xterm.js handle the scroll event
  }

  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const oldZoom = zoom;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.min(3, Math.max(0.15, zoom * delta));

  // Adjust pan so zoom centers on cursor
  pan.x = mx - (mx - pan.x) * (zoom / oldZoom);
  pan.y = my - (my - pan.y) * (zoom / oldZoom);
  applyTransform();
}, { passive: false });

// ════════════════════════════════════════════
// Fit all cards in view
// ════════════════════════════════════════════
document.getElementById('btn-fit').addEventListener('click', fitAll);

function fitAll() {
  if (cards.length === 0) return;
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const c of cards) {
    minX = Math.min(minX, c.x);
    minY = Math.min(minY, c.y);
    maxX = Math.max(maxX, c.x + c.w);
    maxY = Math.max(maxY, c.y + c.h);
  }
  const cw = maxX - minX;
  const ch = maxY - minY;
  const pad = 60;
  zoom = Math.min((vw - pad * 2) / cw, (vh - pad * 2) / ch, 1.5);
  pan.x = (vw - cw * zoom) / 2 - minX * zoom;
  pan.y = (vh - ch * zoom) / 2 - minY * zoom;
  applyTransform();
  // Refit all terminals after zoom settles
  setTimeout(() => cards.forEach(c => { if (c.fitAddon) c.fitAddon.fit(); }), 100);
}

// ════════════════════════════════════════════
// Minimap
// ════════════════════════════════════════════
const minimapEl = document.getElementById('minimap');
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');

function drawMinimap() {
  const mw = mmCanvas.width;
  const mh = mmCanvas.height;
  const scaleX = mw / CANVAS_W;
  const scaleY = mh / CANVAS_H;

  mmCtx.clearRect(0, 0, mw, mh);

  // Background
  mmCtx.fillStyle = '#181825';
  mmCtx.fillRect(0, 0, mw, mh);

  // Card symbols
  for (const c of cards) {
    const cx = c.x * scaleX + (c.w * scaleX) / 2;
    const cy = c.y * scaleY + (c.h * scaleY) / 2;
    const stateColor = STATE_COLORS[c.state] || STATE_COLORS.connecting;
    // Card rect
    mmCtx.fillStyle = stateColor + '25';
    mmCtx.fillRect(c.x * scaleX, c.y * scaleY, c.w * scaleX, c.h * scaleY);
    // Symbol
    mmCtx.font = 'bold 10px monospace';
    mmCtx.textAlign = 'center';
    mmCtx.textBaseline = 'middle';
    mmCtx.fillStyle = stateColor;
    mmCtx.fillText(c.symbol, cx, cy);
  }

  // Viewport rect
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const vx = (-pan.x / zoom) * scaleX;
  const vy = (-pan.y / zoom) * scaleY;
  const vfw = (vw / zoom) * scaleX;
  const vfh = (vh / zoom) * scaleY;
  mmCtx.strokeStyle = '#cdd6f4';
  mmCtx.lineWidth = 1.5;
  mmCtx.strokeRect(vx, vy, vfw, vfh);
}

// Click minimap to jump
minimapEl.addEventListener('click', (e) => {
  const rect = mmCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const scaleX = mmCanvas.width / CANVAS_W;
  const scaleY = mmCanvas.height / CANVAS_H;
  const canvasX = mx / scaleX;
  const canvasY = my / scaleY;
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  pan.x = -(canvasX * zoom - vw / 2);
  pan.y = -(canvasY * zoom - vh / 2);
  applyTransform();
});

// ════════════════════════════════════════════
// Context menu (right-click on empty canvas)
// ════════════════════════════════════════════
let ctxMenuCanvasPos = { x: 0, y: 0 };

viewport.addEventListener('contextmenu', (e) => {
  // Only show on empty canvas, not on terminal cards
  if (e.target !== viewport && e.target !== canvas) return;
  e.preventDefault();
  // Suppress menu if user right-click-dragged (panned) beyond threshold
  if (rightClickStart) {
    const dx = e.clientX - rightClickStart.x;
    const dy = e.clientY - rightClickStart.y;
    rightClickStart = null;
    if (Math.sqrt(dx * dx + dy * dy) > 5) return;
  }
  ctxMenuCanvasPos = screenToCanvas(e.clientX, e.clientY);
  showContextMenu(e.clientX, e.clientY);
});

document.addEventListener('click', () => hideContextMenu());
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideContextMenu(); });

// Context menu is built from two sources:
//   1. `CARD_TYPE_REGISTRY.menuEntries()` — drives the "static" card-type rows
//      (currently only Canvas Claude Code; any future card type that registers
//      with a menuSection will be picked up automatically).
//   2. Data-driven contributors that are dynamic per-invocation: discovered
//      hubs, host shells, widget types, probe profiles. These still live here
//      because they are not single card types but *factories* for one type
//      parameterised per row.
// All click handlers dispatch through `CARD_TYPE_REGISTRY.spawn(type, opts)`.
// Pre-fetch blueprints for context menu. Cached on each right-click open.
async function _refreshBlueprintCache() {
  try {
    const resp = await fetch('/api/blueprints');
    if (resp.ok) window._cachedBlueprints = await resp.json();
  } catch { /* non-fatal */ }
}

function showContextMenu(sx, sy) {
  // Refresh blueprint cache (non-blocking — uses cached for current render)
  _refreshBlueprintCache();
  // Build dynamic contributors for each menuSection.
  const isWin = navigator.platform.startsWith('Win') || navigator.userAgent.includes('Windows');
  const hostShells = isWin ? [
    { id: 'powershell', label: 'PowerShell', cmd: 'powershell.exe', container: 'localhost' },
    { id: 'cmd', label: 'Command Prompt', cmd: 'cmd.exe', container: 'localhost' },
    { id: 'util', label: 'Utility Container', cmd: 'docker.exe exec -it supreme-claudemander-util bash', container: 'supreme-claudemander-util' },
  ] : [
    { id: 'zsh', label: 'zsh', cmd: '/bin/zsh -l', container: 'localhost' },
    { id: 'bash', label: 'bash', cmd: '/bin/bash -l', container: 'localhost' },
    { id: 'util', label: 'Utility Container', cmd: 'docker exec -it supreme-claudemander-util bash', container: 'supreme-claudemander-util' },
  ];

  let html = '';
  const pendingHandlers = []; // {selector, handler}

  // --- Spawn terminal (one row per discovered hub) ---
  html += '<div class="ctx-header">Spawn terminal</div>';
  hubs.forEach((h) => {
    const sym = hubSymbolMap[h.hub] || '?';
    const detail = h.container ? ` <span style="color:#585b70;font-size:11px">(${h.container})</span>` : '';
    html += `<div class="ctx-item" data-hub="${h.hub}">
      <span class="symbol-preview">${sym}</span>
      ${h.hub}${detail}
    </div>`;
  });
  pendingHandlers.push({
    selector: '.ctx-item[data-hub]',
    handler: (item) => {
      const hub = hubs.find(h => h.hub === item.dataset.hub);
      if (hub) CARD_TYPE_REGISTRY.spawn('terminal', { hub, x: ctxMenuCanvasPos.x, y: ctxMenuCanvasPos.y });
    },
  });

  // --- Host terminal (one row per host shell) ---
  html += '<div class="ctx-header">Host terminal</div>';
  for (const shell of hostShells) {
    html += `<div class="ctx-item" data-host-shell="${shell.id}" data-host-cmd="${shell.cmd}" data-host-container="${shell.container}">
      <span class="symbol-preview" style="color:#89b4fa">H</span>
      ${shell.label}
    </div>`;
  }
  pendingHandlers.push({
    selector: '.ctx-item[data-host-shell]',
    handler: (item) => {
      const shellId = item.dataset.hostShell;
      const shellCmd = item.dataset.hostCmd;
      const shellContainer = item.dataset.hostContainer || 'localhost';
      if (!hubSymbolMap[shellId]) hubSymbolMap[shellId] = 'H';
      CARD_TYPE_REGISTRY.spawn('terminal', {
        hub: shellId,
        container: shellContainer,
        exec: shellCmd,
        x: ctxMenuCanvasPos.x,
        y: ctxMenuCanvasPos.y,
      });
    },
  });

  // --- Spawn widget (one row per widget type) ---
  const widgetTypes = Object.keys(WIDGET_REGISTRY);
  if (widgetTypes.length > 0) {
    html += '<div class="ctx-header">Spawn widget</div>';
    for (const wt of widgetTypes) {
      const def = WIDGET_REGISTRY[wt];
      html += `<div class="ctx-item" data-widget="${wt}">
        <span class="symbol-preview">W</span>
        ${def.label || wt}
      </div>`;
    }
    pendingHandlers.push({
      selector: '.ctx-item[data-widget]',
      handler: (item) => {
        CARD_TYPE_REGISTRY.spawn('widget', {
          widgetType: item.dataset.widget,
          x: ctxMenuCanvasPos.x,
          y: ctxMenuCanvasPos.y,
        });
      },
    });
  }

  // --- Blueprints submenu (fetched from server, max 10) ---
  // Fetching is async but we build the menu synchronously — use a cached list
  // that refreshes on each context menu open.
  if (window._cachedBlueprints && window._cachedBlueprints.length > 0) {
    html += '<div class="ctx-header">Blueprints</div>';
    for (const name of window._cachedBlueprints.slice(0, 10)) {
      html += `<div class="ctx-item" data-blueprint="${name}">
        <span class="symbol-preview" style="color:#f9e2af">B</span>
        ${name}
      </div>`;
    }
    pendingHandlers.push({
      selector: '.ctx-item[data-blueprint]',
      async: true,
      handler: async (item) => {
        const name = item.dataset.blueprint;
        try {
          const resp = await fetch('/api/blueprints/spawn', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name,
              x: ctxMenuCanvasPos.x,
              y: ctxMenuCanvasPos.y,
            }),
          });
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({ error: 'spawn failed' }));
            console.error('[blueprint] spawn failed:', err);
            return;
          }
          const desc = await resp.json();
          // The BlueprintCard will appear via card_created control event
          // but we also spawn it directly for immediate visual feedback
          await CARD_TYPE_REGISTRY.spawn('blueprint', {
            ...desc,
            x: ctxMenuCanvasPos.x,
            y: ctxMenuCanvasPos.y,
          });
        } catch (err) {
          console.error('[blueprint] spawn error:', err);
        }
      },
    });
  }

  // --- Claude usage probe (one row per configured profile) ---
  if (probeProfiles.length > 0) {
    html += '<div class="ctx-header">Claude usage probe</div>';
    for (const profile of probeProfiles) {
      html += `<div class="ctx-item" data-probe-profile="${profile}">
        <span class="symbol-preview" style="color:#a6e3a1">P</span>
        ${profile}
      </div>`;
    }
    pendingHandlers.push({
      selector: '.ctx-item[data-probe-profile]',
      async: true,
      handler: async (item) => {
        const profile = item.dataset.probeProfile;
        try {
          const resp = await fetch(`/api/probe/claude-usage?profile=${encodeURIComponent(profile)}`, { method: 'POST' });
          if (!resp.ok) throw new Error(await resp.text());
          const { session_id } = await resp.json();
          const hubName = `claude-probe-${profile}`;
          if (!hubSymbolMap[hubName]) hubSymbolMap[hubName] = 'P';
          await CARD_TYPE_REGISTRY.spawn('terminal', {
            hub: hubName,
            container: 'supreme-claudemander-util',
            exec: null,
            sessionId: session_id,
            x: ctxMenuCanvasPos.x,
            y: ctxMenuCanvasPos.y,
            w: 960,
            h: 640,
          });
        } catch (err) {
          console.error('Failed to start claude usage probe:', err);
        }
      },
    });
  }

  // --- Registry-driven card-type rows ---
  // Walk menuEntries() and render one header+row per section. Sections already
  // handled above (terminals, widgets) are omitted here since they are
  // contributed data-driven above. Any other section (e.g. canvas-claude) is
  // emitted verbatim.
  const entries = CARD_TYPE_REGISTRY.menuEntries();
  const handledSections = new Set(['terminals', 'widgets']);
  const seenSections = new Set();
  for (const entry of entries) {
    if (handledSections.has(entry.menuSection)) continue;
    if (!seenSections.has(entry.menuSection)) {
      // Title-case the section name for the header. E.g. "canvas-claude"
      // becomes "Canvas Claude".
      const headerText = entry.menuSection
        .split(/[-_]/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
      html += `<div class="ctx-header">${headerText}</div>`;
      seenSections.add(entry.menuSection);
    }
    html += `<div class="ctx-item" data-card-type="${entry.type}">
      <span class="symbol-preview" style="color:#cba6f7">${entry.symbol}</span>
      ${entry.label}
    </div>`;
  }
  pendingHandlers.push({
    selector: '.ctx-item[data-card-type]',
    async: true,
    handler: async (item) => {
      await CARD_TYPE_REGISTRY.spawn(item.dataset.cardType, {
        x: ctxMenuCanvasPos.x,
        y: ctxMenuCanvasPos.y,
      });
    },
  });

  ctxMenu.innerHTML = html;
  ctxMenu.style.left = sx + 'px';
  ctxMenu.style.top = sy + 'px';
  ctxMenu.classList.add('visible');

  // Clamp menu position so it doesn't overflow the viewport
  const menuRect = ctxMenu.getBoundingClientRect();
  if (menuRect.bottom > window.innerHeight) {
    ctxMenu.style.top = Math.max(10, window.innerHeight - menuRect.height - 10) + 'px';
  }
  if (menuRect.right > window.innerWidth) {
    ctxMenu.style.left = Math.max(10, window.innerWidth - menuRect.width - 10) + 'px';
  }

  // Wire all pending click handlers in one pass.
  for (const { selector, handler, async: isAsync } of pendingHandlers) {
    ctxMenu.querySelectorAll(selector).forEach(item => {
      item.addEventListener('click', async (e) => {
        e.stopPropagation();
        hideContextMenu();
        if (isAsync) await handler(item);
        else handler(item);
      });
    });
  }
}

function hideContextMenu() {
  ctxMenu.classList.remove('visible');
}

function screenToCanvas(sx, sy) {
  const rect = viewport.getBoundingClientRect();
  return {
    x: (sx - rect.left - pan.x) / zoom,
    y: (sy - rect.top - pan.y) / zoom,
  };
}

// ════════════════════════════════════════════
// Terminal theme (shared)
// ════════════════════════════════════════════
const TERM_THEME = {
  background: '#1e1e2e',
  foreground: '#cdd6f4',
  cursor: '#f5e0dc',
  selectionBackground: '#585b7066',
  black: '#45475a', red: '#f38ba8', green: '#a6e3a1', yellow: '#f9e2af',
  blue: '#89b4fa', magenta: '#cba6f7', cyan: '#94e2d5', white: '#bac2de',
  brightBlack: '#585b70', brightRed: '#f38ba8', brightGreen: '#a6e3a1', brightYellow: '#f9e2af',
  brightBlue: '#89b4fa', brightMagenta: '#cba6f7', brightCyan: '#94e2d5', brightWhite: '#a6adc8',
};

// ════════════════════════════════════════════
// Card base class
// ════════════════════════════════════════════
class Card {
  static nextId = 0;
  static maxZ = 10;

  constructor({ hub, container, x, y, w, h, symbol, type }) {
    this.id = Card.nextId++;
    this.type = type || 'base';
    this.hub = hub;
    this.container = container;
    this.x = x;
    this.y = y;
    this.w = w || CARD_W;
    this.h = h || CARD_H;
    this.symbol = symbol;
    this.execCmd = null; // overridden by subclasses if needed
    this.state = 'connecting';
    this.lastOutput = 0;
    this.controlGroupNums = []; // array of group numbers (1-9)
    this.el = null;
    this._cancelDrag = null;
    this._cancelResize = null;
  }

  createElement() {
    const el = document.createElement('div');
    el.className = 'terminal-card';
    el.style.left = this.x + 'px';
    el.style.top = this.y + 'px';
    el.style.width = this.w + 'px';
    el.style.height = this.h + 'px';
    el.style.zIndex = ++Card.maxZ;
    el.dataset.cardId = this.id;

    const copyLabel = cards.filter(c => c.hub === this.hub).length;

    // Titlebar
    const titlebar = document.createElement('div');
    titlebar.className = 'terminal-titlebar';
    titlebar.dataset.drag = this.id;

    const symbolSpan = document.createElement('span');
    symbolSpan.className = 'hub-symbol';
    symbolSpan.dataset.symbol = this.id;
    symbolSpan.style.color = STATE_COLORS.connecting;
    symbolSpan.textContent = this.symbol;
    titlebar.appendChild(symbolSpan);

    // Control group badges container
    const badgeContainer = document.createElement('span');
    badgeContainer.className = 'control-group-badges';
    badgeContainer.dataset.cgBadges = this.id;
    titlebar.appendChild(badgeContainer);

    const nameSpan = document.createElement('span');
    nameSpan.className = 'hub-name';
    nameSpan.textContent = this.hub;
    titlebar.appendChild(nameSpan);

    if (copyLabel > 0) {
      const copySpan = document.createElement('span');
      copySpan.style.cssText = 'color:#585b70;font-size:11px';
      copySpan.textContent = '#' + (copyLabel + 1);
      titlebar.appendChild(copySpan);
    }

    const containerSpan = document.createElement('span');
    containerSpan.className = 'container-name';
    containerSpan.textContent = this.container;
    titlebar.appendChild(containerSpan);

    const spacer = document.createElement('span');
    spacer.className = 'spacer';
    titlebar.appendChild(spacer);

    const closeBtn = document.createElement('button');
    closeBtn.className = 'close-btn';
    closeBtn.dataset.close = this.id;
    closeBtn.innerHTML = '&times;';
    titlebar.appendChild(closeBtn);

    el.appendChild(titlebar);

    // Body (subclass hook)
    const body = this.createBody();
    body.dataset.body = this.id;
    el.appendChild(body);

    // Resize handle
    const resizeHandle = document.createElement('div');
    resizeHandle.className = 'resize-handle';
    resizeHandle.dataset.resize = this.id;
    el.appendChild(resizeHandle);

    this.el = el;

    // Focus on click
    el.addEventListener('pointerdown', () => {
      focusCard(this.id);
      el.style.zIndex = ++Card.maxZ;
    });

    // Double-click anywhere on card to zoom-to-fill
    el.addEventListener('dblclick', (e) => {
      if (e.target.closest('.close-btn')) return;
      if (e.target.closest('.claude-btn')) return;
      zoomToCard(this);
    });

    // Close button
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      destroyCard(this.id);
    });

    return el;
  }

  createBody() {
    const body = document.createElement('div');
    body.className = 'terminal-body';
    return body;
  }

  onInit() {}

  onDestroy() {}

  onFocus() { this.el.classList.add('focused'); }

  onBlur() { this.el.classList.remove('focused'); }

  setupDrag() {
    const titlebar = this.el.querySelector(`[data-drag="${this.id}"]`);
    let startX, startY, origX, origY;

    const onMove = (e) => {
      const rawX = origX + (e.clientX - startX) / zoom;
      const rawY = origY + (e.clientY - startY) / zoom;
      [this.x, this.y] = snapEdges(rawX, rawY, this.w, this.h, this.id);
      this.el.style.left = this.x + 'px';
      this.el.style.top = this.y + 'px';
      drawMinimap();
    };
    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      [this.x, this.y] = snapPos(this.x, this.y, this.w, this.h, this.id);
      this.el.style.left = this.x + 'px';
      this.el.style.top = this.y + 'px';
      saveLayout();
    };

    titlebar.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.close-btn')) return;
      startX = e.clientX;
      startY = e.clientY;
      origX = this.x;
      origY = this.y;
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      e.preventDefault();
      e.stopPropagation();
    });

    this._cancelDrag = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
    };
  }

  setupResize() {
    const handle = this.el.querySelector(`[data-resize="${this.id}"]`);
    let startX, startY, origW, origH;

    const onMove = (e) => {
      this.w = snapGrid(Math.max(300, origW + (e.clientX - startX) / zoom));
      this.h = snapGrid(Math.max(200, origH + (e.clientY - startY) / zoom));
      this.el.style.width = this.w + 'px';
      this.el.style.height = this.h + 'px';
      drawMinimap();
    };
    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      saveLayout();
    };

    handle.addEventListener('pointerdown', (e) => {
      startX = e.clientX;
      startY = e.clientY;
      origW = this.w;
      origH = this.h;
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      e.preventDefault();
      e.stopPropagation();
    });

    this._cancelResize = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
    };
  }

  updateState(newState) {
    this.state = newState;
    if (newState === 'working') this.lastOutput = Date.now();
    const symbolEl = this.el.querySelector(`[data-symbol="${this.id}"]`);
    if (symbolEl) symbolEl.style.color = STATE_COLORS[newState] || STATE_COLORS.connecting;
    drawMinimap();
  }

  serialize() {
    const data = { hub: this.hub, x: this.x, y: this.y, w: this.w, h: this.h, type: this.type, controlGroups: this.controlGroupNums.length > 0 ? [...this.controlGroupNums] : undefined };
    if (this.execCmd) data.exec = this.execCmd;
    if (this.sessionId) data.session_id = this.sessionId;
    return data;
  }

  destroy() {
    this.onDestroy();
    if (this._cancelDrag) this._cancelDrag();
    if (this._cancelResize) this._cancelResize();
    if (this.el && this.el.parentNode) {
      this.el.parentNode.removeChild(this.el);
    }
  }
}

// ════════════════════════════════════════════
// CARD_TYPE_REGISTRY
// ════════════════════════════════════════════
// Single dispatcher for card creation, deserialization, and menu generation.
// Each card class self-registers immediately after its definition by calling
// CARD_TYPE_REGISTRY.register(typeName, { cardClass, label, symbol, defaultSize, menuSection, prepareOpts }).
//
// - spawn(typeName, opts): generic mount path — optionally runs the registered
//   `prepareOpts(opts)` hook (which may be async), constructs the class, appends
//   to the canvas, wires up drag/resize, runs onInit, refreshes minimap + hub
//   count, and returns the mounted card. This is the single entry point for all
//   card creation — context menu, MCP control-ws, layout restore, and layoutGrid
//   all route through here.
//
// - prepareOpts(opts) (optional, per-type): async hook that transforms / enriches
//   the caller's opts before the card is constructed. Used for type-specific
//   preparation such as hub-symbol lookup, canvas-claude session staleness
//   probes, or priority-profile resolution. Returning `null` aborts the spawn.
//   Returning an object replaces `opts` entirely; mutating and returning nothing
//   (or `undefined`) keeps the mutated version.
//
// - deserialize(data): dispatches to `<CardClass>.fromSerialized(data)` using
//   data.type as the key. Legacy layout entries that have no `type` field but do
//   carry a `hub` field are treated as terminals (pre-type-field compatibility).
//   Unknown type -> logs a warning and returns null so callers can skip the entry.
//   NOTE: deserialize() does NOT run prepareOpts — it rebuilds the card from the
//   already-validated serialized form. Callers that need the full async prep
//   path (e.g. canvas-claude reload) should call `spawn()` with the layout entry
//   as opts instead.
//
// - menuEntries(): returns an array of
//   `{type, label, symbol, defaultSize, menuSection}` for every registered type
//   that opted in to menu display (i.e. has a truthy `menuSection`). Preserves
//   registration order. Consumed by `showContextMenu()` to drive the
//   "Canvas Claude Code" section and any future menu-visible card types.
//
// Adding a new card type requires only two things:
//   1. define the class (with a `static fromSerialized(data)`)
//   2. call CARD_TYPE_REGISTRY.register(...) once after the class body
// No other file or call-site changes are needed.
const CARD_TYPE_REGISTRY = {
  _types: {},
  _order: [],

  register(typeName, entry) {
    if (!typeName || typeof typeName !== 'string') {
      console.warn('CARD_TYPE_REGISTRY.register: invalid typeName', typeName);
      return;
    }
    if (!entry || typeof entry.cardClass !== 'function') {
      console.warn('CARD_TYPE_REGISTRY.register: "%s" missing cardClass', typeName);
      return;
    }
    if (this._types[typeName]) {
      console.warn('CARD_TYPE_REGISTRY.register: replacing existing entry for "%s"', typeName);
    } else {
      this._order.push(typeName);
    }
    // Use nullish checks (not `||`) so intentional empty values are preserved.
    // LoaderCard registers with `symbol: ''` on purpose — `||` would rewrite
    // that to `'?'`. `label: ''` and an explicit `menuSection: ''` are
    // similarly honoured if a caller passes them.
    this._types[typeName] = {
      cardClass: entry.cardClass,
      label: entry.label != null ? entry.label : typeName,
      symbol: entry.symbol != null ? entry.symbol : '?',
      defaultSize: entry.defaultSize != null ? entry.defaultSize : { w: CARD_W, h: CARD_H },
      menuSection: entry.menuSection != null ? entry.menuSection : null,
      prepareOpts: typeof entry.prepareOpts === 'function' ? entry.prepareOpts : null,
    };
  },

  get(typeName) {
    return this._types[typeName] || null;
  },

  has(typeName) {
    return Object.prototype.hasOwnProperty.call(this._types, typeName);
  },

  // Generic mount path. Runs the per-type `prepareOpts` hook (if any),
  // constructs the card, appends it to the canvas, wires up drag/resize, runs
  // onInit, and refreshes minimap + hub count. Returns a Promise that resolves
  // to the mounted card instance, or null on unknown type / aborted prep. If
  // the caller omits `w` and/or `h`, the registry's `defaultSize` for this
  // type is applied.
  async spawn(typeName, opts) {
    const entry = this._types[typeName];
    if (!entry) {
      console.warn('CARD_TYPE_REGISTRY.spawn: unknown type "%s"', typeName);
      return null;
    }
    let mergedOpts = { ...(opts || {}) };
    if (entry.prepareOpts) {
      try {
        const result = await entry.prepareOpts(mergedOpts);
        if (result === null) return null; // hook aborted
        if (result && typeof result === 'object') mergedOpts = result;
      } catch (err) {
        console.warn('CARD_TYPE_REGISTRY.spawn: prepareOpts for "%s" threw: %o', typeName, err);
        return null;
      }
    }
    if (mergedOpts.w == null) mergedOpts.w = entry.defaultSize.w;
    if (mergedOpts.h == null) mergedOpts.h = entry.defaultSize.h;
    const card = new entry.cardClass(mergedOpts);
    // Apply savedControlGroups before _mount so its badge-update path fires.
    if (Array.isArray(mergedOpts.controlGroups) && mergedOpts.controlGroups.length > 0) {
      card.controlGroupNums = [...mergedOpts.controlGroups];
    }
    return this._mount(card);
  },

  // Mount an already-constructed card onto the canvas. Split out from spawn()
  // so deserialize() and future migration call-sites can reuse the same path.
  _mount(card) {
    if (!card) return null;
    card.createElement();
    canvas.appendChild(card.el);
    cards.push(card);
    if (typeof card.setupDrag === 'function') card.setupDrag();
    if (typeof card.setupResize === 'function') card.setupResize();
    if (typeof card.onInit === 'function') card.onInit();
    if (Array.isArray(card.controlGroupNums) && card.controlGroupNums.length > 0) {
      if (typeof updateControlGroupBadges === 'function') updateControlGroupBadges(card);
    }
    if (typeof drawMinimap === 'function') drawMinimap();
    if (typeof updateHubCount === 'function') updateHubCount();
    return card;
  },

  // Reconstruct a card instance from a serialized layout entry. Does NOT mount
  // the card — returns the bare instance (or null). Callers decide whether to
  // push through _mount() or hand off to a specialised spawn helper.
  deserialize(data) {
    if (!data || typeof data !== 'object') {
      console.warn('CARD_TYPE_REGISTRY.deserialize: invalid data', data);
      return null;
    }
    // Legacy layouts: entries without an explicit `type` but carrying a `hub`
    // field are pre-type-field terminal cards.
    let typeName = data.type;
    if (!typeName && data.hub) typeName = 'terminal';
    if (!typeName) {
      console.warn('CARD_TYPE_REGISTRY.deserialize: entry has no type and no hub, skipping');
      return null;
    }
    const entry = this._types[typeName];
    if (!entry) {
      console.warn('CARD_TYPE_REGISTRY: unknown type "%s", skipping', typeName);
      return null;
    }
    if (typeof entry.cardClass.fromSerialized !== 'function') {
      console.warn('CARD_TYPE_REGISTRY: "%s" has no static fromSerialized, skipping', typeName);
      return null;
    }
    try {
      return entry.cardClass.fromSerialized(data);
    } catch (err) {
      console.warn('CARD_TYPE_REGISTRY: fromSerialized threw for "%s": %o', typeName, err);
      return null;
    }
  },

  // Returns menu-visible entries in registration order. LoaderCard and other
  // transient types register without a menuSection and are omitted.
  //
  // NOTE: intentionally unused by current call-sites — the context menu still
  // builds its entries from hard-coded strings. This is the target consumer
  // for the #124/#125 migration; keep the shape stable (type, label, symbol,
  // defaultSize, menuSection).
  menuEntries() {
    const out = [];
    for (const typeName of this._order) {
      const entry = this._types[typeName];
      if (!entry || !entry.menuSection) continue;
      out.push({
        type: typeName,
        label: entry.label,
        symbol: entry.symbol,
        defaultSize: entry.defaultSize,
        menuSection: entry.menuSection,
      });
    }
    return out;
  },
};

// ════════════════════════════════════════════
// TerminalCard subclass
// ════════════════════════════════════════════
class TerminalCard extends Card {
  constructor(opts) {
    super({ type: 'terminal', ...opts });
    this.execCmd = opts.exec || null;
    this.sessionId = opts.sessionId || null; // persistent session ID
    this.term = null;
    this.fitAddon = null;
    this.ws = null;
    this.ro = null;
    this._cleanup = null;
    this._reconnectDelay = 1000;
    this._reconnectTimer = null;
    this._intentionalClose = false;
  }

  createBody() {
    const body = document.createElement('div');
    body.className = 'terminal-body';
    return body;
  }

  onInit() {
    this.initTerminal();
    this.connectWs();
    this.setupInput();
    this.setupResizeObserver();
    this.setupClaudeBtn();
  }

  onDestroy() {
    if (this.sessionId) _markSessionDestroyed(this.sessionId);
    if (this.ro) this.ro.disconnect();
    this._intentionalClose = true;
    if (this._reconnectTimer) clearTimeout(this._reconnectTimer);
    if (this.ws && this.ws.readyState === WebSocket.OPEN) this.ws.close();
    if (this.term) this.term.dispose();
  }

  initTerminal() {
    this.term = new window.Terminal({
      cursorBlink: true,
      fontSize: 13,
      fontFamily: '"JetBrains Mono","Cascadia Code","Consolas",monospace',
      theme: TERM_THEME,
    });
    this.fitAddon = new window.FitAddon.FitAddon();
    this.term.loadAddon(this.fitAddon);
    if (window.WebLinksAddon) this.term.loadAddon(new window.WebLinksAddon.WebLinksAddon());

    const body = this.el.querySelector(`[data-body="${this.id}"]`);
    this.term.open(body);
    this.fitAddon.fit();
  }

  connectWs() {
    this._intentionalClose = false;
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    let wsUrl;
    if (this.sessionId) {
      // Reconnect to existing persistent session
      wsUrl = `${wsProto}//${location.host}/ws/session/${this.sessionId}`;
    } else {
      // Create new persistent session
      const _docker = (navigator.platform.startsWith('Win') || navigator.userAgent.includes('Windows')) ? 'docker.exe' : 'docker';
      const cmd = this.execCmd || `${_docker} exec -it -u vscode -w /workspaces/${this.hub} ${this.container} bash -l`;
      wsUrl = `${wsProto}//${location.host}/ws/session/new?cmd=${encodeURIComponent(cmd)}&hub=${encodeURIComponent(this.hub)}&container=${encodeURIComponent(this.container || '')}`;
    }
    this.ws = new WebSocket(wsUrl);
    this.ws.binaryType = 'arraybuffer';

    this._sessionCreatedAt = null;
    this.ws.addEventListener('open', () => {
      this._reconnectDelay = 1000;
      this._sessionCreatedAt = Date.now();
      this.updateState('idle');
      this.ws.send(JSON.stringify({ type: 'resize', cols: this.term.cols, rows: this.term.rows }));
    });
    this.ws.addEventListener('message', (ev) => {
      if (typeof ev.data === 'string') {
        // Control message from server (session_id, errors, etc.)
        try {
          const msg = JSON.parse(ev.data);
          if (msg.session_id) {
            this.sessionId = msg.session_id;
            saveLayout();
            if (msg.tmux === false && this.container) {
              this.term.write('\r\n\x1b[33m⚠ tmux not available in container — terminal will not persist across server restarts. Install tmux in the container to enable persistence.\x1b[0m\r\n');
            }
          }
          if (msg.error === 'session_not_found') {
            this.sessionId = null;
            this._intentionalClose = true; // prevent close event from also reconnecting
            this.connectWs(); // create new session
            return;
          }
        } catch {}
      } else if (ev.data instanceof ArrayBuffer) {
        this.term.write(new Uint8Array(ev.data));
        this.updateState('working');
      }
    });
    this.ws.addEventListener('close', () => {
      this.updateState('dead');
      // If the session died within 3 seconds of creation, the command likely failed
      // (e.g. bash not found in container). Stop reconnecting to avoid a runaway loop.
      const sessionAge = this._sessionCreatedAt ? Date.now() - this._sessionCreatedAt : Infinity;
      if (sessionAge < 3000) {
        this.term.write('\r\n\x1b[31m[command failed — not reconnecting]\x1b[0m\r\n');
        return;
      }
      if (!this._intentionalClose) {
        this.term.write('\r\n\x1b[33m[reconnecting...]\x1b[0m\r\n');
        this._reconnectTimer = setTimeout(() => {
          this._reconnectDelay = Math.min(this._reconnectDelay * 2, 30000);
          this.connectWs();
        }, this._reconnectDelay);
      } else {
        this.term.write('\r\n\x1b[31m[disconnected]\x1b[0m\r\n');
      }
    });
    this.ws.addEventListener('error', () => { this.updateState('dead'); });
  }

  setupInput() {
    const doPaste = () => {
      navigator.clipboard.readText().then(text => {
        if (text && this.ws && this.ws.readyState === WebSocket.OPEN) this.ws.send(new TextEncoder().encode(text));
      });
    };

    this.term.onData((data) => {
      if (this.ws && this.ws.readyState === WebSocket.OPEN) this.ws.send(new TextEncoder().encode(data));
    });

    this.term.attachCustomKeyEventHandler((ev) => {
      if (ev.type !== 'keydown') return true;

      // Escape exits terminal mode — let it bubble to the document handler
      if (ev.key === 'Escape') return false;

      // Copy
      if (ev.ctrlKey && ev.shiftKey && ev.key === 'C') {
        const sel = this.term.getSelection();
        if (sel) navigator.clipboard.writeText(sel);
        return false;
      }
      if (settings.copy === 'ctrl-c-sel' && ev.ctrlKey && !ev.shiftKey && ev.key === 'c') {
        const sel = this.term.getSelection();
        if (sel && sel.length > 0) {
          navigator.clipboard.writeText(sel);
          return false; // intercept Ctrl+C only when there's a selection
        }
      }

      // Paste
      if (ev.ctrlKey && ev.shiftKey && ev.key === 'V') {
        if (settings.paste === 'ctrl-shift-v' || settings.paste === 'both') { doPaste(); return false; }
      }
      if (ev.ctrlKey && !ev.shiftKey && ev.key === 'v') {
        if (settings.paste === 'ctrl-v' || settings.paste === 'both') { doPaste(); return false; }
      }

      return true;
    });

    // Auto-copy on select
    this.term.onSelectionChange(() => {
      if (settings.copy === 'auto-select') {
        const sel = this.term.getSelection();
        if (sel) navigator.clipboard.writeText(sel);
      }
    });

    // Right-click on terminal body
    const body = this.el.querySelector(`[data-body="${this.id}"]`);
    body.addEventListener('contextmenu', (ev) => {
      ev.preventDefault();
      // Only paste on stationary right-click, not after a right-click-drag pan
      if (rightClickStart) {
        const dx = ev.clientX - rightClickStart.x;
        const dy = ev.clientY - rightClickStart.y;
        rightClickStart = null;
        if (Math.sqrt(dx * dx + dy * dy) > 5) return;
      }
      if (settings.rightclick === 'paste') doPaste();
    });
  }

  setupResizeObserver() {
    const body = this.el.querySelector(`[data-body="${this.id}"]`);
    this.ro = new ResizeObserver(() => {
      this.fitAddon.fit();
      if (this.ws && this.ws.readyState === WebSocket.OPEN) {
        this.ws.send(JSON.stringify({ type: 'resize', cols: this.term.cols, rows: this.term.rows }));
      }
    });
    this.ro.observe(body);
  }

  setupClaudeBtn() {
    const titlebar = this.el.querySelector(`[data-drag="${this.id}"]`);
    const closeBtn = titlebar.querySelector('.close-btn');

    const btn = document.createElement('button');
    btn.className = 'claude-btn';
    btn.title = 'Start Claude';
    btn.innerHTML = '&#9654;';

    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      btn.disabled = true;
      try {
        const resp = await fetch('/api/profiles/priority');
        if (!resp.ok) {
          this.term.write(`\r\n\x1b[31m[Failed to fetch priority profile: HTTP ${resp.status}]\x1b[0m\r\n`);
          return;
        }
        const data = await resp.json();
        const name = data.priority_profile;
        if (!name) {
          this.term.write('\r\n\x1b[33m[No priority profile set — configure one in the Profile Manager]\x1b[0m\r\n');
          return;
        }
        if (!/^[a-zA-Z0-9._-]+$/.test(name)) {
          this.term.write('\r\n\x1b[31m[Invalid profile name — contains unsafe characters]\x1b[0m\r\n');
          return;
        }
        const command = `env CLAUDE_CONFIG_DIR=/profiles/${name} claude\n`;
        if (this.ws && this.ws.readyState === WebSocket.OPEN) {
          this.ws.send(new TextEncoder().encode(command));
        } else {
          this.term.write('\r\n\x1b[31m[Not connected — cannot send command]\x1b[0m\r\n');
        }
      } catch (err) {
        this.term.write(`\r\n\x1b[31m[Error fetching priority profile: ${err.message}]\x1b[0m\r\n`);
      } finally {
        btn.disabled = false;
      }
    });

    titlebar.insertBefore(btn, closeBtn);
  }

  static fromSerialized(data) {
    const card = new TerminalCard({
      hub: data.hub,
      container: data.container || '',
      x: data.x || 0,
      y: data.y || 0,
      w: data.w,
      h: data.h,
      symbol: (typeof hubSymbolMap !== 'undefined' && hubSymbolMap[data.hub]) || '?',
      exec: data.exec || null,
      sessionId: data.session_id || null,
    });
    if (Array.isArray(data.controlGroups)) {
      card.controlGroupNums = [...data.controlGroups];
    }
    return card;
  }
}

CARD_TYPE_REGISTRY.register('terminal', {
  cardClass: TerminalCard,
  label: 'Terminal',
  symbol: 'T',
  defaultSize: { w: CARD_W, h: CARD_H },
  menuSection: 'terminals',
  // Resolve symbol from hubSymbolMap and normalise opts shape. Callers pass a
  // flat `{hub, container, exec, sessionId, x, y, w, h, controlGroups}` and
  // this hook turns it into the shape TerminalCard's constructor expects.
  // Supports both real hubs (pre-registered in `hubs[]`) and synthetic hubs
  // (host shells, probe-profile terminals) where the caller supplies `hub` as
  // a string name + explicit `container`/`exec`.
  prepareOpts(opts) {
    // Back-compat: if caller passed a `hub` object (the pre-migration shape),
    // flatten it into the opts record.
    if (opts.hub && typeof opts.hub === 'object') {
      const hubObj = opts.hub;
      opts.hub = hubObj.hub;
      if (opts.container == null) opts.container = hubObj.container;
      if (opts.exec == null) opts.exec = hubObj.exec || null;
    }
    if (!opts.symbol) {
      opts.symbol = (opts.hub && hubSymbolMap[opts.hub]) || '?';
    }
    return opts;
  },
});

// ════════════════════════════════════════════
// CanvasClaudeCard subclass
// ════════════════════════════════════════════
class CanvasClaudeCard extends TerminalCard {
  constructor(opts) {
    super({ ...opts, type: 'canvas_claude' });
    this.profile = opts.profile || null;
    this.canvasName = opts.canvasName || null;
  }

  setupClaudeBtn() {
    // Override: no default "Start Claude" button; just a Clear button
    const titlebar = this.el.querySelector(`[data-drag="${this.id}"]`);
    const closeBtn = titlebar.querySelector('.close-btn');

    const clearBtn = document.createElement('button');
    clearBtn.className = 'clear-session-btn';
    clearBtn.title = 'Clear conversation history';
    clearBtn.textContent = 'Clear';

    clearBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      clearBtn.disabled = true;
      try {
        const sid = this.sessionId;
        if (sid) {
          await fetch(`/api/canvas-claude/${sid}/clear`, { method: 'POST' });
        }
      } catch (err) {
        console.error('Clear session failed:', err);
      } finally {
        clearBtn.disabled = false;
      }
    });

    titlebar.insertBefore(clearBtn, closeBtn);
  }

  onInit() {
    this.initTerminal();
    this.setupInput();
    this.setupResizeObserver();
    this.setupClaudeBtn();
    if (!this.sessionId) {
      this._showNoPriorityOverlay();
      return; // connectWs() will be called by _retryConnect() once a session exists
    }
    this.connectWs();
  }

  _showNoPriorityOverlay() {
    const body = this.el.querySelector(`[data-body="${this.id}"]`);
    body.style.position = 'relative';
    const overlay = document.createElement('div');
    overlay.dataset.pendingOverlay = this.id;
    overlay.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#1e1e2e;z-index:10;padding:24px;text-align:center';

    const icon = document.createElement('div');
    icon.textContent = '⚠';
    icon.style.cssText = 'font-size:26px;color:#f9e2af';

    const msg = document.createElement('div');
    msg.dataset.pendingMsg = this.id;
    msg.style.cssText = 'color:#cdd6f4;font-size:13px;font-weight:bold';
    msg.textContent = this.profile ? `Profile: ${this.profile}` : 'No priority profile set';

    const hint = document.createElement('div');
    hint.dataset.pendingHint = this.id;
    hint.style.cssText = 'color:#6c7086;font-size:11px;line-height:1.6;max-width:280px';
    hint.textContent = this.profile
      ? 'Click Retry when the util container is running and credentials are ready.'
      : 'Set a priority profile in the Profile Manager widget, then click Retry.';

    const btn = document.createElement('button');
    btn.dataset.pendingRetry = this.id;
    btn.textContent = 'Retry';
    btn.style.cssText = 'margin-top:6px;padding:5px 20px;background:#313244;border:1px solid #45475a;border-radius:6px;color:#89b4fa;font-size:12px;cursor:pointer';
    btn.addEventListener('click', () => this._retryConnect());

    overlay.append(icon, msg, hint, btn);
    body.appendChild(overlay);
  }

  async _retryConnect() {
    const btn = this.el.querySelector(`[data-pending-retry="${this.id}"]`);
    const hint = this.el.querySelector(`[data-pending-hint="${this.id}"]`);
    if (btn) { btn.disabled = true; btn.textContent = 'Checking…'; }
    if (hint) { hint.style.color = '#6c7086'; hint.textContent = 'Looking up priority profile…'; }

    try {
      let profile = null;
      const pr = await fetch('/api/profiles/priority');
      if (pr.ok) {
        const pd = await pr.json();
        if (pd.priority_profile && /^[a-zA-Z0-9._-]+$/.test(pd.priority_profile)) {
          profile = pd.priority_profile;
        }
      }

      if (!profile) {
        if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
        if (hint) { hint.style.color = '#f38ba8'; hint.textContent = 'Still no priority profile. Set one in the Profile Manager and try again.'; }
        return;
      }

      this.profile = profile;
      const msgEl = this.el.querySelector(`[data-pending-msg="${this.id}"]`);
      if (msgEl) msgEl.textContent = `Profile: ${profile}`;
      const params = new URLSearchParams({ x: Math.round(this.x), y: Math.round(this.y), w: this.w, h: this.h });
      params.set('profile', profile);
      if (this.canvasName) params.set('canvas_name', this.canvasName);
      const resp = await fetch(`/api/canvas-claude/create?${params}`, { method: 'POST' });
      if (!resp.ok) throw new Error(await resp.text());
      const desc = await resp.json();
      this.sessionId = desc.session_id;
      saveLayout();

      const overlay = this.el.querySelector(`[data-pending-overlay="${this.id}"]`);
      if (overlay) overlay.remove();
      this._intentionalClose = false;
      this.connectWs();
    } catch (err) {
      console.error('Canvas Claude retry failed:', err);
      if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
      if (hint) { hint.style.color = '#f38ba8'; hint.textContent = 'Failed to start session — check the server logs and try again.'; }
    }
  }

  connectWs() {
    // Canvas Claude cards always connect via /ws/session/{id} (never the
    // /ws/session/new path, which would bypass MCP config + tmux setup).
    // If session_not_found is received, we go through the server-side
    // create API to get a properly initialised session.
    if (!this.sessionId) return; // no session yet — _retryConnect() will call connectWs() once one is created
    if (this._reconnectTimer) { clearTimeout(this._reconnectTimer); this._reconnectTimer = null; }
    this._intentionalClose = false;
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProto}//${location.host}/ws/session/${this.sessionId}`;
    this.ws = new WebSocket(wsUrl);
    this.ws.binaryType = 'arraybuffer';

    this._sessionCreatedAt = null;
    this.ws.addEventListener('open', () => {
      this._reconnectDelay = 1000;
      this._sessionCreatedAt = Date.now();
      this.updateState('idle');
      this.ws.send(JSON.stringify({ type: 'resize', cols: this.term.cols, rows: this.term.rows }));
    });
    this.ws.addEventListener('message', (ev) => {
      if (typeof ev.data === 'string') {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.session_id) {
            this.sessionId = msg.session_id;
            saveLayout();
          }
          if (msg.error === 'session_not_found') {
            // Session died — recreate via the server API (writes MCP config + tmux).
            this._intentionalClose = true;
            this._recreateSession();
            return;
          }
        } catch {}
      } else if (ev.data instanceof ArrayBuffer) {
        this.term.write(new Uint8Array(ev.data));
        this.updateState('working');
      }
    });
    this.ws.addEventListener('close', () => {
      this.updateState('dead');
      // If the session died within 10 s of connection, the canvas claude command
      // likely failed (e.g. docker exec error, tmux session could not start).
      // Stop reconnecting to avoid a runaway create loop — the user can click
      // Retry to try again explicitly.
      const sessionAge = this._sessionCreatedAt ? Date.now() - this._sessionCreatedAt : Infinity;
      if (sessionAge < 10000) {
        this.term.write('\r\n\x1b[31m[canvas claude failed to start — not reconnecting]\x1b[0m\r\n');
        return;
      }
      if (!this._intentionalClose) {
        this.term.write('\r\n\x1b[33m[reconnecting...]\x1b[0m\r\n');
        this._reconnectTimer = setTimeout(() => {
          this._reconnectDelay = Math.min(this._reconnectDelay * 2, 30000);
          this.connectWs();
        }, this._reconnectDelay);
      } else {
        this.term.write('\r\n\x1b[31m[disconnected]\x1b[0m\r\n');
      }
    });
    this.ws.addEventListener('error', () => { this.updateState('dead'); });
  }

  async _recreateSession() {
    // If we don't have a profile, we cannot start a credentialed session.
    // Show the overlay so the user can set up credentials explicitly.
    if (!this.profile) {
      this.sessionId = null;
      saveLayout();
      this._showNoPriorityOverlay();
      return;
    }

    // Ask the server to create a fresh canvas claude session (MCP config + tmux).
    try {
      this.term.write('\r\n\x1b[33m[session expired — restarting...]\x1b[0m\r\n');
      const params = new URLSearchParams({ x: this.x, y: this.y, w: this.w, h: this.h });
      params.set('profile', this.profile);
      if (this.canvasName) params.set('canvas_name', this.canvasName);
      const resp = await fetch(`/api/canvas-claude/create?${params}`, { method: 'POST' });
      if (!resp.ok) {
        this.term.write('\r\n\x1b[31m[failed to restart session]\x1b[0m\r\n');
        return;
      }
      const desc = await resp.json();
      this.sessionId = desc.session_id;
      saveLayout();
      this._intentionalClose = false;
      this.connectWs();
    } catch (err) {
      console.error('Canvas Claude recreate failed:', err);
      this.term.write('\r\n\x1b[31m[failed to restart session]\x1b[0m\r\n');
    }
  }

  serialize() {
    const data = super.serialize();
    data.type = 'canvas_claude';
    data.profile = this.profile;
    data.canvasName = this.canvasName;
    return data;
  }

  // NOTE: this synchronous deserializer does NOT check whether
  // `data.session_id` is still alive on the server — the session-staleness
  // probe lives in the registered `prepareOpts` hook for `canvas_claude` (see
  // the `CARD_TYPE_REGISTRY.register('canvas_claude', ...)` call below). All
  // layout-restore / context-menu / MCP spawn paths flow through
  // `CARD_TYPE_REGISTRY.spawn('canvas_claude', ...)` which awaits the hook
  // before constructing the card. `fromSerialized` is called only by
  // `CARD_TYPE_REGISTRY.deserialize()`, which currently has no consumers for
  // canvas-claude — it is retained for symmetry with the other card types and
  // for any future caller that wants a bare-instance path.
  static fromSerialized(data) {
    const card = new CanvasClaudeCard({
      hub: data.hub || 'canvas-claude',
      container: data.container || 'supreme-claudemander-util',
      x: data.x || 0,
      y: data.y || 0,
      w: data.w || 960,
      h: data.h || 640,
      symbol: 'C',
      exec: data.exec || null,
      sessionId: data.session_id || null,
      profile: data.profile || null,
      canvasName: data.canvasName || null,
    });
    if (Array.isArray(data.controlGroups)) {
      card.controlGroupNums = [...data.controlGroups];
    }
    return card;
  }
}

CARD_TYPE_REGISTRY.register('canvas_claude', {
  cardClass: CanvasClaudeCard,
  label: 'Canvas Claude Code',
  symbol: 'C',
  defaultSize: { w: 960, h: 640 },
  menuSection: 'canvas-claude',
  // Async prep: (a) drop stale session IDs via `/api/sessions` probe so a
  // restarted server doesn't leave a zombie card, (b) resolve priority profile
  // from `/api/profiles/priority` when none was passed in, (c) fill defaults
  // for hub / container / canvasName. This is the single owner of the
  // staleness-check contract for canvas-claude cards.
  async prepareOpts(opts) {
    // Staleness check: if caller supplied a sessionId, confirm it is still
    // alive on the server before reusing it.
    if (opts.sessionId) {
      try {
        const sessions = await (await fetch('/api/sessions')).json();
        const alive = sessions.some(s => s.session_id === opts.sessionId && s.alive);
        if (!alive) {
          console.log(`[canvas-claude] stale session ${opts.sessionId} — will create fresh`);
          opts.sessionId = null;
        }
      } catch (_) {
        // If the session list fetch fails, assume stale and recreate.
        opts.sessionId = null;
      }
    }
    // Resolve profile from priority credential when none provided.
    if (!opts.sessionId && !opts.profile) {
      try {
        const pr = await fetch('/api/profiles/priority');
        if (pr.ok) {
          const pd = await pr.json();
          if (pd.priority_profile && /^[a-zA-Z0-9._-]+$/.test(pd.priority_profile)) {
            opts.profile = pd.priority_profile;
          }
        }
      } catch (_) { /* non-fatal */ }
    }
    if (opts.hub == null) opts.hub = 'canvas-claude';
    if (opts.container == null) opts.container = 'supreme-claudemander-util';
    if (opts.canvasName == null) opts.canvasName = currentCanvasName || null;
    if (opts.symbol == null) opts.symbol = 'C';
    return opts;
  },
});

// ════════════════════════════════════════════
// LoaderCard subclass
// ════════════════════════════════════════════
// LoaderCard is a transient boot card shown while the startup script runs.
// It extends Card (#127) so it participates in the `instanceof Card` contract
// and can round-trip through serialize()/fromSerialized(), but it still renders
// its own minimal DOM (no terminal titlebar, no drag/resize handles) — it is
// destroyed once startup finishes and is never saved to a canvas layout.
class LoaderCard extends Card {
  constructor({ scriptName, x, y }) {
    super({ hub: '__loader__', container: '', x, y, w: 360, h: 140, symbol: '', type: 'loader' });
    this.scriptName = scriptName;
    this.statusEl = null;
    this.error = false;
  }

  createElement() {
    const el = document.createElement('div');
    el.className = 'loader-card';
    el.style.left = this.x + 'px';
    el.style.top = this.y + 'px';
    el.style.width = this.w + 'px';
    el.style.height = this.h + 'px';
    el.style.zIndex = 999;

    const titlebar = document.createElement('div');
    titlebar.className = 'loader-titlebar';
    titlebar.textContent = 'Startup';
    el.appendChild(titlebar);

    const body = document.createElement('div');
    body.className = 'loader-body';

    const spinner = document.createElement('div');
    spinner.className = 'loader-spinner';
    body.appendChild(spinner);

    const status = document.createElement('div');
    status.className = 'loader-status';
    status.textContent = `Running: ${this.scriptName}`;
    body.appendChild(status);
    this.statusEl = status;

    el.appendChild(body);
    this.el = el;
    return el;
  }

  setStatus(text) {
    if (this.statusEl) this.statusEl.textContent = text;
  }

  setError(msg) {
    this.error = true;
    if (this.el) this.el.classList.add('error');
    this.setStatus(msg);
  }

  serialize() {
    // Loader cards are transient and never written to a saved canvas, but a
    // valid layout object is required so LoaderCard honours the Card contract.
    return { type: 'loader', x: this.x, y: this.y, w: this.w, h: this.h, scriptName: this.scriptName };
  }

  static fromSerialized(data) {
    const card = new LoaderCard({
      scriptName: data.scriptName || '',
      x: data.x || 0,
      y: data.y || 0,
    });
    if (data.w) card.w = data.w;
    if (data.h) card.h = data.h;
    return card;
  }

  destroy() {
    if (this.el && this.el.parentNode) {
      this.el.parentNode.removeChild(this.el);
    }
  }
}

// LoaderCard is transient — it registers so that deserialize() can round-trip
// it through the registry, but intentionally has no menuSection so it never
// appears in the spawn context menu.
CARD_TYPE_REGISTRY.register('loader', {
  cardClass: LoaderCard,
  label: 'Loader',
  symbol: '',
  defaultSize: { w: 360, h: 140 },
  menuSection: null,
});
